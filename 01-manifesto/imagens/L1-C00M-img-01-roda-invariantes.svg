<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Inter, system-ui, sans-serif">
  <title>A Roda dos 9 Invariantes da IA</title>
  <desc>Diagrama-assinatura da obra Inteligência Aumentada. Os 9 Invariantes organizados em roda em torno da frase âncora.</desc>

  <defs>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#E97451"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b263b"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>

  <rect width="960" height="720" fill="#0d1b2a"/>

  <text x="480" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#fef3c7">OS 9 INVARIANTES DA IA</text>
  <text x="480" y="64" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">Sistema proprietário de Inteligência Aumentada</text>

  <!-- Linhas radiais (centro 480,380, raio 250) -->
  <g stroke="#9ca3af" stroke-width="0.6" opacity="0.35">
    <line x1="480" y1="380" x2="480" y2="130"/>
    <line x1="480" y1="380" x2="641" y2="219"/>
    <line x1="480" y1="380" x2="726" y2="338"/>
    <line x1="480" y1="380" x2="710" y2="471"/>
    <line x1="480" y1="380" x2="606" y2="580"/>
    <line x1="480" y1="380" x2="354" y2="580"/>
    <line x1="480" y1="380" x2="250" y2="471"/>
    <line x1="480" y1="380" x2="234" y2="338"/>
    <line x1="480" y1="380" x2="319" y2="219"/>
  </g>

  <!-- Círculo central -->
  <g>
    <circle cx="480" cy="380" r="80" fill="url(#centerGrad)" stroke="#fef3c7" stroke-width="2"/>
    <text x="480" y="368" text-anchor="middle" font-size="14" font-weight="800" fill="#0d1b2a">MODELOS PASSAM</text>
    <text x="480" y="388" text-anchor="middle" font-size="14" font-weight="800" fill="#0d1b2a">MÉTODO FICA</text>
    <text x="480" y="408" text-anchor="middle" font-size="9" font-style="italic" fill="#0d1b2a">Inteligência Aumentada</text>
  </g>

  <!-- 9 pétalas posicionadas via cos/sin a 40 graus de distância. Centros calculados.
       cx=480, cy=380, r=250. Pétala = 168x86.
       Ângulos a partir de -90° (topo), sentido horário, passos de 40°. -->

  <!-- Inv 1: topo, ângulo -90° → centro (480, 130) -->
  <g transform="translate(396,87)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">1 · PLAUSIBILIDADE *</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"Plausível ≠ verdadeiro"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 41 · Cap 02</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F8 (auditoria)</text>
  </g>

  <!-- Inv 2: ângulo -50° → centro (641, 219) -->
  <g transform="translate(557,176)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">2 · EXTREMIDADES *</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"O meio morre"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 04 · Cap 11</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F4 PROMPT-EXT</text>
  </g>

  <!-- Inv 3: ângulo -10° → centro (726, 338) -->
  <g transform="translate(642,295)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">3 · CAMADA DUPLA</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"Padrão × número"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 01 + Apx. J</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F9 ROTA-DUPLA</text>
  </g>

  <!-- Inv 4: ângulo 30° → centro (710, 471) -->
  <g transform="translate(626,428)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">4 · ENCAIXE</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"Padrão da tarefa"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 15 · Cap 18</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F2 ENCAIXE-5</text>
  </g>

  <!-- Inv 5: ângulo 70° → centro (606, 580) -->
  <g transform="translate(522,537)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">5 · CUSTO COMPOSTO</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"Vezes que paga"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 36</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F7 COMPOSTO-3T</text>
  </g>

  <!-- Inv 6: ângulo 110° → centro (354, 580) -->
  <g transform="translate(270,537)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">6 · AUTONOMIA PROP.</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"Medir e desfazer"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 40 · Cap 12</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F3 AGENTE-PROP</text>
  </g>

  <!-- Inv 7: ângulo 150° → centro (250, 471) -->
  <g transform="translate(166,428)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">7 · TERMÔMETRO</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"Eval ou fé"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 39</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F8 EVAL-PIRÂMIDE</text>
  </g>

  <!-- Inv 8: ângulo 190° → centro (234, 338) -->
  <g transform="translate(150,295)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">8 · RESPONSABILIDADE</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"Nome humano"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 42 · Cap 37</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F6 GOV-INDELEGÁVEL</text>
  </g>

  <!-- Inv 9: ângulo 230° → centro (319, 219) -->
  <g transform="translate(235,176)">
    <rect width="168" height="86" rx="12" fill="url(#petalGrad)" stroke="#E97451" stroke-width="1.5"/>
    <text x="84" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">9 · OPERADOR</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#fef3c7" font-style="italic">"Multiplica os dois"</text>
    <text x="84" y="60" text-anchor="middle" font-size="8" fill="#9ca3af">Cap-âncora: 34 (L2) · 44</text>
    <text x="84" y="74" text-anchor="middle" font-size="8" fill="#9ca3af">Framework F1 DECID-IA</text>
  </g>

  <text x="480" y="668" text-anchor="middle" font-size="11" fill="#fde68a" font-style="italic">★ Cada Invariante tem máxima, mecânica, violação típica e capítulo-âncora.</text>
  <text x="480" y="690" text-anchor="middle" font-size="10" fill="#9ca3af" font-style="italic">* Invariantes 1 e 2 dependem da arquitetura generativa atual.</text>
</svg>
