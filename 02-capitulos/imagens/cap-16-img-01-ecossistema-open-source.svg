<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="1000" height="580" fill="#fefce8"/>

  <text x="500" y="40" fill="#0d1b2a" font-size="22" font-weight="700" text-anchor="middle">O ECOSSISTEMA OPEN SOURCE DE LLMs — 2026</text>
  <text x="500" y="64" fill="#6b7280" font-size="13" text-anchor="middle">Hugging Face como hub central. Modelos liderados por Meta, Mistral, DeepSeek, Alibaba, Google e Microsoft.</text>

  <!-- Hugging Face center -->
  <rect x="400" y="100" width="200" height="80" rx="14" fill="#E97451"/>
  <text x="500" y="130" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">🤗 HUGGING FACE</text>
  <text x="500" y="150" fill="#fef3c7" font-size="11" text-anchor="middle">o GitHub dos modelos</text>
  <text x="500" y="166" fill="#fef3c7" font-size="10" text-anchor="middle">1M+ modelos, datasets, spaces</text>

  <!-- Meta / Llama -->
  <rect x="60" y="220" width="180" height="100" rx="10" fill="#bfdbfe"/>
  <text x="150" y="246" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">META · Llama 4</text>
  <text x="80" y="270" fill="#374151" font-size="10">• Variantes 8B, 70B, 405B</text>
  <text x="80" y="285" fill="#374151" font-size="10">• Open weights desde 2023</text>
  <text x="80" y="300" fill="#374151" font-size="10">• Padrão do ecossistema</text>
  <text x="80" y="315" fill="#16a34a" font-size="10" font-weight="600">★ flexibilidade máxima</text>

  <!-- Mistral -->
  <rect x="260" y="220" width="180" height="100" rx="10" fill="#cffafe"/>
  <text x="350" y="246" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">MISTRAL · Mistral Large</text>
  <text x="280" y="270" fill="#374151" font-size="10">• Mixtral 8x22B (MoE)</text>
  <text x="280" y="285" fill="#374151" font-size="10">• Codestral (código)</text>
  <text x="280" y="300" fill="#374151" font-size="10">• Foco eficiência</text>
  <text x="280" y="315" fill="#16a34a" font-size="10" font-weight="600">★ europeu, GDPR-friendly</text>

  <!-- DeepSeek -->
  <rect x="460" y="220" width="180" height="100" rx="10" fill="#fecaca"/>
  <text x="550" y="246" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">DEEPSEEK · V3 / R1</text>
  <text x="480" y="270" fill="#374151" font-size="10">• R1 com reasoning visível</text>
  <text x="480" y="285" fill="#374151" font-size="10">• Custos disruptivos</text>
  <text x="480" y="300" fill="#374151" font-size="10">• Open weights MIT</text>
  <text x="480" y="315" fill="#16a34a" font-size="10" font-weight="600">★ frontier ao preço de Haiku</text>

  <!-- Qwen -->
  <rect x="660" y="220" width="180" height="100" rx="10" fill="#fde68a"/>
  <text x="750" y="246" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">ALIBABA · Qwen 3</text>
  <text x="680" y="270" fill="#374151" font-size="10">• Variantes 0.5B até 235B</text>
  <text x="680" y="285" fill="#374151" font-size="10">• Forte em multilíngue</text>
  <text x="680" y="300" fill="#374151" font-size="10">• Qwen-Coder dedicado</text>
  <text x="680" y="315" fill="#16a34a" font-size="10" font-weight="600">★ asiático e ocidental</text>

  <!-- Gemma -->
  <rect x="60" y="340" width="180" height="100" rx="10" fill="#bbf7d0"/>
  <text x="150" y="366" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">GOOGLE · Gemma 3</text>
  <text x="80" y="390" fill="#374151" font-size="10">• Variantes 2B, 9B, 27B</text>
  <text x="80" y="405" fill="#374151" font-size="10">• Compactos e rápidos</text>
  <text x="80" y="420" fill="#374151" font-size="10">• Multimodal nativo</text>
  <text x="80" y="435" fill="#16a34a" font-size="10" font-weight="600">★ rodar em laptop</text>

  <!-- Phi -->
  <rect x="260" y="340" width="180" height="100" rx="10" fill="#e9d5ff"/>
  <text x="350" y="366" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">MICROSOFT · Phi-4</text>
  <text x="280" y="390" fill="#374151" font-size="10">• 14B parâmetros</text>
  <text x="280" y="405" fill="#374151" font-size="10">• Treino em dados curados</text>
  <text x="280" y="420" fill="#374151" font-size="10">• Performance acima da escala</text>
  <text x="280" y="435" fill="#16a34a" font-size="10" font-weight="600">★ pequeno e competente</text>

  <!-- GLM -->
  <rect x="460" y="340" width="180" height="100" rx="10" fill="#fcd34d"/>
  <text x="550" y="366" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">Z.AI · GLM-5.1</text>
  <text x="480" y="390" fill="#374151" font-size="10">• Frontier chinês</text>
  <text x="480" y="405" fill="#374151" font-size="10">• Competitivo em benchmarks</text>
  <text x="480" y="420" fill="#374151" font-size="10">• Open weights</text>
  <text x="480" y="435" fill="#16a34a" font-size="10" font-weight="600">★ alternativa de fronteira</text>

  <!-- Especializados -->
  <rect x="660" y="340" width="180" height="100" rx="10" fill="#f3e8ff"/>
  <text x="750" y="366" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">ESPECIALIZADOS</text>
  <text x="680" y="390" fill="#374151" font-size="10">• CodeLlama, StarCoder</text>
  <text x="680" y="405" fill="#374151" font-size="10">• Med-PaLM, BioGPT</text>
  <text x="680" y="420" fill="#374151" font-size="10">• Whisper (áudio)</text>
  <text x="680" y="435" fill="#16a34a" font-size="10" font-weight="600">★ vertical domain</text>

  <!-- Connecting lines -->
  <g stroke="#9ca3af" stroke-width="1" stroke-dasharray="3 3" fill="none" opacity="0.5">
    <line x1="500" y1="180" x2="150" y2="220"/>
    <line x1="500" y1="180" x2="350" y2="220"/>
    <line x1="500" y1="180" x2="550" y2="220"/>
    <line x1="500" y1="180" x2="750" y2="220"/>
    <line x1="500" y1="180" x2="150" y2="340"/>
    <line x1="500" y1="180" x2="350" y2="340"/>
    <line x1="500" y1="180" x2="550" y2="340"/>
    <line x1="500" y1="180" x2="750" y2="340"/>
  </g>

  <text x="500" y="490" fill="#0d1b2a" font-size="14" font-weight="700" text-anchor="middle">FERRAMENTAS DE EXECUÇÃO</text>
  <text x="500" y="512" fill="#6b7280" font-size="11" text-anchor="middle">Ollama (local) · vLLM (serving) · TGI (Hugging Face) · llama.cpp (CPU/laptop)</text>
  <text x="500" y="530" fill="#6b7280" font-size="11" text-anchor="middle">LM Studio (desktop) · Together AI · Replicate · Modal (hosted) · Groq (rápido)</text>
  <text x="500" y="558" fill="#E97451" font-size="11" text-anchor="middle" font-weight="600">A barreira para usar open source caiu drasticamente. A decisão hoje é estratégica, não técnica.</text>
</svg>
