    <text x="80" y="394" fill="#374151" font-size="11">• langchain-ai/langchain</text>
    <text x="80" y="412" fill="#374151" font-size="11">• chroma-core/chroma</text>
    <text x="80" y="430" fill="#374151" font-size="11">• qdrant/qdrant</text>
    <text x="80" y="448" fill="#374151" font-size="11">• pinecone-io/examples</text>
    <text x="80" y="478" fill="#dc2626" font-size="10" font-weight="700">Por que importam:</text>
    <text x="80" y="496" fill="#6b7280" font-size="10">Frameworks RAG e bancos vetoriais</text>
    <text x="80" y="510" fill="#6b7280" font-size="10">padrão da indústria</text>
  </g>

  <g>
    <rect x="360" y="320" width="280" height="200" rx="10" fill="#e9d5ff" stroke="#9333ea" stroke-width="2"/>
    <text x="500" y="348" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">⚙️ AI ENGINEERING &amp; OBSERVABILITY</text>
    <text x="380" y="376" fill="#374151" font-size="11">• langfuse/langfuse</text>
    <text x="380" y="394" fill="#374151" font-size="11">• Helicone/helicone</text>
    <text x="380" y="412" fill="#374151" font-size="11">• Arize-ai/phoenix</text>
    <text x="380" y="430" fill="#374151" font-size="11">• braintrust-ai/braintrust</text>
    <text x="380" y="448" fill="#374151" font-size="11">• promptfoo/promptfoo</text>
    <text x="380" y="478" fill="#9333ea" font-size="10" font-weight="700">Por que importam:</text>
    <text x="380" y="496" fill="#6b7280" font-size="10">Observabilidade, evals e tooling</text>
    <text x="380" y="510" fill="#6b7280" font-size="10">para operar IA em produção</text>
  </g>

  <g>
    <rect x="660" y="320" width="280" height="200" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
    <text x="800" y="348" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">🚀 MODELOS OPEN SOURCE</text>
    <text x="680" y="376" fill="#374151" font-size="11">• meta-llama/llama</text>
    <text x="680" y="394" fill="#374151" font-size="11">• mistralai/mistral-inference</text>
    <text x="680" y="412" fill="#374151" font-size="11">• deepseek-ai/DeepSeek-V3</text>
    <text x="680" y="430" fill="#374151" font-size="11">• QwenLM/Qwen</text>
    <text x="680" y="448" fill="#374151" font-size="11">• ollama/ollama</text>
    <text x="680" y="478" fill="#0891b2" font-size="10" font-weight="700">Por que importam:</text>
    <text x="680" y="496" fill="#6b7280" font-size="10">Modelos open weights + ferramentas</text>
    <text x="680" y="510" fill="#6b7280" font-size="10">para rodar localmente</text>
