<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="1000" height="540" fill="#fefce8"/>
  <text x="500" y="40" fill="#0d1b2a" font-size="22" font-weight="700" text-anchor="middle">REPOSITÓRIOS GITHUB POR CATEGORIA</text>
  <text x="500" y="64" fill="#6b7280" font-size="13" text-anchor="middle">A constelação de open source que sustenta o ecossistema de IA moderna</text>

  <g>
    <rect x="60" y="100" width="280" height="200" rx="10" fill="#fde68a" stroke="#fb923c" stroke-width="2"/>
    <text x="200" y="128" fill="#0d1b2a" font-size="13" font-weight="700" text-anchor="middle">🤖 CLAUDE &amp; ANTHROPIC</text>
    <text x="80" y="156" fill="#374151" font-size="11">• anthropics/claude-code</text>
    <text x="80" y="174" fill="#374151" font-size="11">• anthropics/anthropic-sdk-python</text>
    <text x="80" y="192" fill="#374151" font-size="11">• anthropics/anthropic-cookbook</text>
    <text x="80" y="210" fill="#374151" font-size="11">• anthropics/courses</text>
    <text x="80" y="228" fill="#374151" font-size="11">• hesreallyhim/awesome-claude-code</text>
    <text x="80" y="258" fill="#fb923c" font-size="10" font-weight="700">Por que importam:</text>
    <text x="80" y="276" fill="#6b7280" font-size="10">SDKs oficiais, exemplos canônicos,</text>
    <text x="80" y="290" fill="#6b7280" font-size="10">curadoria comunitária de qualidade</text>
  </g>

  <g>
