    <text x="380" y="156" fill="#374151" font-size="11">• modelcontextprotocol/servers</text>
    <text x="380" y="174" fill="#374151" font-size="11">• modelcontextprotocol/python-sdk</text>
    <text x="380" y="192" fill="#374151" font-size="11">• modelcontextprotocol/typescript-sdk</text>
    <text x="380" y="210" fill="#374151" font-size="11">• punkpeye/awesome-mcp-servers</text>
    <text x="380" y="228" fill="#374151" font-size="11">• wong2/awesome-mcp-clients</text>
    <text x="380" y="258" fill="#16a34a" font-size="10" font-weight="700">Por que importam:</text>
    <text x="380" y="276" fill="#6b7280" font-size="10">A spec aberta + servidores prontos</text>
    <text x="380" y="290" fill="#6b7280" font-size="10">para dezenas de SaaS comuns</text>
  </g>

