    <text x="680" y="156" fill="#374151" font-size="11">• langchain-ai/langgraph</text>
    <text x="680" y="174" fill="#374151" font-size="11">• crewAIInc/crewAI</text>
    <text x="680" y="192" fill="#374151" font-size="11">• microsoft/autogen</text>
    <text x="680" y="210" fill="#374151" font-size="11">• Significant-Gravitas/AutoGPT</text>
    <text x="680" y="228" fill="#374151" font-size="11">• e2b-dev/awesome-ai-agents</text>
    <text x="680" y="258" fill="#2563eb" font-size="10" font-weight="700">Por que importam:</text>
    <text x="680" y="276" fill="#6b7280" font-size="10">Orquestração de agentes em produção,</text>
    <text x="680" y="290" fill="#6b7280" font-size="10">com padrões e abstrações maduros</text>
  </g>

