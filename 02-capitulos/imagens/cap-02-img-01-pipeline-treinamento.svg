<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E97451"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#0d1b2a"/>

  <text x="450" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">O CICLO DO TREINAMENTO</text>
  <text x="450" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">Como bilhões de exemplos viram pesos de um modelo</text>

  <!-- Step 1: Data -->
  <rect x="40" y="160" width="160" height="100" rx="10" fill="#1f2937" stroke="#E97451" stroke-width="2"/>
  <text x="120" y="195" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">1. DADOS</text>
  <text x="120" y="220" fill="#e5e7eb" font-size="11" text-anchor="middle">trilhões de tokens</text>
  <text x="120" y="238" fill="#9ca3af" font-size="10" text-anchor="middle">texto, código,</text>
  <text x="120" y="252" fill="#9ca3af" font-size="10" text-anchor="middle">livros, web</text>

  <line x1="200" y1="210" x2="240" y2="210" stroke="#E97451" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 2: Model -->
  <rect x="240" y="160" width="160" height="100" rx="10" fill="#1f2937" stroke="#E97451" stroke-width="2"/>
  <text x="320" y="195" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">2. MODELO</text>
  <text x="320" y="220" fill="#e5e7eb" font-size="11" text-anchor="middle">prediz próximo token</text>
  <text x="320" y="238" fill="#9ca3af" font-size="10" text-anchor="middle">com pesos atuais</text>

  <line x1="400" y1="210" x2="440" y2="210" stroke="#E97451" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 3: Loss -->
  <rect x="440" y="160" width="160" height="100" rx="10" fill="#1f2937" stroke="#E97451" stroke-width="2"/>
  <text x="520" y="195" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">3. ERRO</text>
  <text x="520" y="220" fill="#e5e7eb" font-size="11" text-anchor="middle">previsto vs. real</text>
  <text x="520" y="238" fill="#9ca3af" font-size="10" text-anchor="middle">função de perda</text>

  <line x1="600" y1="210" x2="640" y2="210" stroke="#E97451" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 4: Update -->
  <rect x="640" y="160" width="180" height="100" rx="10" fill="#E97451" stroke="#fef3c7" stroke-width="2"/>
  <text x="730" y="195" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">4. AJUSTE</text>
  <text x="730" y="220" fill="#fef3c7" font-size="11" text-anchor="middle">backprop +</text>
  <text x="730" y="238" fill="#fef3c7" font-size="11" text-anchor="middle">gradient descent</text>
  <text x="730" y="254" fill="#fef3c7" font-size="10" text-anchor="middle" font-style="italic">→ novos pesos</text>

  <!-- Feedback loop -->
  <path d="M 730 260 Q 730 360 320 360 Q 240 360 240 280 L 240 260" stroke="#E97451" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow1)"/>
  <text x="500" y="385" fill="#fef3c7" font-size="11" text-anchor="middle" font-style="italic">repete bilhões de vezes</text>

  <!-- Bottom callouts -->
  <rect x="100" y="410" width="700" height="50" rx="8" fill="#1b263b" stroke="#374151"/>
  <text x="450" y="432" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">Resultado: pesos congelados</text>
  <text x="450" y="450" fill="#9ca3af" font-size="11" text-anchor="middle">— quando o ciclo termina, esses pesos viram o "cérebro" do modelo —</text>

  <!-- Cost note -->
  <text x="450" y="110" fill="#fbbf24" font-size="12" text-anchor="middle">⚡ Custo típico de um treinamento frontier (2026): US$ 50–500 milhões em compute</text>
</svg>
