<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="mem-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E97451"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#0d1b2a"/>

  <text x="450" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">ARQUITETURA DE MEMÓRIA EM AGENTES MODERNOS</text>
  <text x="450" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">Como agentes mantêm continuidade entre sessões sem precisar reenviar tudo</text>

  <!-- LLM in center -->
  <rect x="370" y="200" width="160" height="80" rx="10" fill="#E97451"/>
  <text x="450" y="232" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">LLM</text>
  <text x="450" y="252" fill="#fef3c7" font-size="11" text-anchor="middle">processa pergunta</text>
  <text x="450" y="268" fill="#fef3c7" font-size="11" text-anchor="middle">e gera resposta</text>

  <!-- User input -->
  <rect x="370" y="100" width="160" height="60" rx="8" fill="#1f2937"/>
  <text x="450" y="125" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">Usuário</text>
  <text x="450" y="142" fill="#9ca3af" font-size="11" text-anchor="middle">faz pergunta</text>

  <line x1="450" y1="160" x2="450" y2="195" stroke="#E97451" stroke-width="2" marker-end="url(#mem-arrow)"/>

  <!-- Response -->
  <rect x="370" y="320" width="160" height="60" rx="8" fill="#1f2937"/>
  <text x="450" y="345" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">Resposta</text>
  <text x="450" y="362" fill="#9ca3af" font-size="11" text-anchor="middle">com continuidade</text>

  <line x1="450" y1="285" x2="450" y2="315" stroke="#E97451" stroke-width="2" marker-end="url(#mem-arrow)"/>

  <!-- 4 memory stores around LLM -->
  <g>
    <rect x="60" y="100" width="180" height="80" rx="10" fill="#fde68a" stroke="#fb923c"/>
    <text x="150" y="125" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Curto Prazo</text>
    <text x="150" y="143" fill="#374151" font-size="10" text-anchor="middle">contexto da</text>
    <text x="150" y="158" fill="#374151" font-size="10" text-anchor="middle">conversa atual</text>
    <text x="150" y="173" fill="#16a34a" font-size="9" text-anchor="middle">→ injetado no prompt</text>

    <line x1="240" y1="170" x2="365" y2="225" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>

  <g>
    <rect x="660" y="100" width="180" height="80" rx="10" fill="#bbf7d0" stroke="#16a34a"/>
    <text x="750" y="125" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Episódica</text>
    <text x="750" y="143" fill="#374151" font-size="10" text-anchor="middle">conversas passadas</text>
    <text x="750" y="158" fill="#374151" font-size="10" text-anchor="middle">recuperadas por RAG</text>
    <text x="750" y="173" fill="#16a34a" font-size="9" text-anchor="middle">→ trechos relevantes</text>

    <line x1="660" y1="170" x2="535" y2="225" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>

  <g>
    <rect x="60" y="320" width="180" height="80" rx="10" fill="#bfdbfe" stroke="#2563eb"/>
    <text x="150" y="345" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Semântica</text>
    <text x="150" y="363" fill="#374151" font-size="10" text-anchor="middle">perfil do usuário</text>
    <text x="150" y="378" fill="#374151" font-size="10" text-anchor="middle">fatos consolidados</text>
    <text x="150" y="393" fill="#16a34a" font-size="9" text-anchor="middle">→ system prompt</text>

    <line x1="240" y1="345" x2="365" y2="260" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>

  <g>
    <rect x="660" y="320" width="180" height="80" rx="10" fill="#fecaca" stroke="#dc2626"/>
    <text x="750" y="345" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Procedural</text>
    <text x="750" y="363" fill="#374151" font-size="10" text-anchor="middle">skills, workflows</text>
    <text x="750" y="378" fill="#374151" font-size="10" text-anchor="middle">padrões aprendidos</text>
    <text x="750" y="393" fill="#16a34a" font-size="9" text-anchor="middle">→ tools / skills</text>

    <line x1="660" y1="345" x2="535" y2="260" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>

  <text x="450" y="450" fill="#9ca3af" font-size="11" text-anchor="middle" font-style="italic">Os quatro tipos podem ser combinados. Quanto mais sofisticado o agente, mais camadas ativas.</text>
  <text x="450" y="475" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">O LLM continua sem memória. Quem lembra é a arquitetura em volta dele.</text>
</svg>
