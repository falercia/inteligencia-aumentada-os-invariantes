<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="600" fill="#fefce8"/>

  <text x="400" y="40" fill="#0d1b2a" font-size="22" font-weight="700" text-anchor="middle">AS CAMADAS CONCEITUAIS DA IA</text>
  <text x="400" y="64" fill="#6b7280" font-size="13" text-anchor="middle">Cada camada interna é uma especialização da externa</text>

  <rect x="60" y="100" width="680" height="460" rx="14" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="80" y="128" fill="#0d1b2a" font-size="14" font-weight="700">INTELIGÊNCIA ARTIFICIAL</text>
  <text x="80" y="146" fill="#6b7280" font-size="11">campo amplo · sistemas que executam tarefas que requerem inteligência</text>

  <rect x="100" y="170" width="600" height="370" rx="12" fill="#fde68a" opacity="0.6"/>
  <text x="120" y="196" fill="#0d1b2a" font-size="13" font-weight="700">MACHINE LEARNING</text>
  <text x="120" y="212" fill="#374151" font-size="11">sistemas que aprendem padrões a partir de dados</text>

  <rect x="140" y="232" width="520" height="290" rx="10" fill="#fdba74" opacity="0.7"/>
  <text x="160" y="258" fill="#0d1b2a" font-size="13" font-weight="700">DEEP LEARNING</text>
  <text x="160" y="274" fill="#374151" font-size="11">ML com redes neurais profundas (camadas múltiplas)</text>

  <rect x="180" y="294" width="440" height="210" rx="8" fill="#fb923c" opacity="0.75"/>
  <text x="200" y="320" fill="#0d1b2a" font-size="13" font-weight="700">IA GENERATIVA</text>
  <text x="200" y="336" fill="#0d1b2a" font-size="11">modelos que geram conteúdo novo</text>

  <rect x="220" y="356" width="360" height="130" rx="6" fill="#E97451"/>
  <text x="400" y="392" fill="#fefce8" font-size="16" font-weight="800" text-anchor="middle">LLMs</text>
  <text x="400" y="416" fill="#fef3c7" font-size="12" text-anchor="middle">Large Language Models</text>
  <text x="400" y="438" fill="#fef3c7" font-size="11" text-anchor="middle">Claude · GPT · Gemini · Llama</text>
  <text x="400" y="462" fill="#fef3c7" font-size="10" text-anchor="middle" font-style="italic">o núcleo da "IA Moderna" de 2026</text>

  <text x="400" y="580" fill="#6b7280" font-size="11" text-anchor="middle" font-style="italic">"Quando alguém diz 'IA' em 2026, geralmente está se referindo ao miolo dessa cebola — os LLMs."</text>
</svg>
