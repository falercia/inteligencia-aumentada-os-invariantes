<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="cycle-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E97451"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#0d1b2a"/>

  <text x="450" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">LIFECYCLE DE UMA APLICAÇÃO DE IA</text>
  <text x="450" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">Diferente de software tradicional, IA exige avaliação contínua e adaptação constante</text>

  <!-- Phase 1 -->
  <rect x="60" y="120" width="160" height="70" rx="10" fill="#1b263b" stroke="#fbbf24" stroke-width="2"/>
  <text x="140" y="148" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">1. DESIGN</text>
  <text x="140" y="166" fill="#9ca3af" font-size="10" text-anchor="middle">caso de uso, métricas</text>
  <text x="140" y="180" fill="#9ca3af" font-size="10" text-anchor="middle">de sucesso, riscos</text>

  <line x1="220" y1="155" x2="245" y2="155" stroke="#E97451" stroke-width="2" marker-end="url(#cycle-arrow)"/>

  <!-- Phase 2 -->
  <rect x="250" y="120" width="160" height="70" rx="10" fill="#1b263b" stroke="#86efac" stroke-width="2"/>
  <text x="330" y="148" fill="#86efac" font-size="12" font-weight="700" text-anchor="middle">2. PROTOTIPAÇÃO</text>
  <text x="330" y="166" fill="#9ca3af" font-size="10" text-anchor="middle">prompt, RAG, agentes</text>
  <text x="330" y="180" fill="#9ca3af" font-size="10" text-anchor="middle">em iterações rápidas</text>

  <line x1="410" y1="155" x2="435" y2="155" stroke="#E97451" stroke-width="2" marker-end="url(#cycle-arrow)"/>

  <!-- Phase 3 -->
  <rect x="440" y="120" width="160" height="70" rx="10" fill="#1b263b" stroke="#fb923c" stroke-width="2"/>
  <text x="520" y="148" fill="#fb923c" font-size="12" font-weight="700" text-anchor="middle">3. AVALIAÇÃO</text>
  <text x="520" y="166" fill="#9ca3af" font-size="10" text-anchor="middle">evals, golden dataset,</text>
  <text x="520" y="180" fill="#9ca3af" font-size="10" text-anchor="middle">benchmarks próprios</text>

  <line x1="600" y1="155" x2="625" y2="155" stroke="#E97451" stroke-width="2" marker-end="url(#cycle-arrow)"/>

  <!-- Phase 4 -->
  <rect x="630" y="120" width="160" height="70" rx="10" fill="#1b263b" stroke="#bfdbfe" stroke-width="2"/>
  <text x="710" y="148" fill="#bfdbfe" font-size="12" font-weight="700" text-anchor="middle">4. DEPLOY</text>
  <text x="710" y="166" fill="#9ca3af" font-size="10" text-anchor="middle">staging → canário →</text>
  <text x="710" y="180" fill="#9ca3af" font-size="10" text-anchor="middle">produção gradual</text>

  <!-- Arrow down -->
  <line x1="710" y1="195" x2="710" y2="245" stroke="#E97451" stroke-width="2" marker-end="url(#cycle-arrow)"/>

  <!-- Phase 5 -->
  <rect x="630" y="250" width="160" height="70" rx="10" fill="#1b263b" stroke="#fca5a5" stroke-width="2"/>
  <text x="710" y="278" fill="#fca5a5" font-size="12" font-weight="700" text-anchor="middle">5. OBSERVAR</text>
  <text x="710" y="296" fill="#9ca3af" font-size="10" text-anchor="middle">métricas em runtime,</text>
  <text x="710" y="310" fill="#9ca3af" font-size="10" text-anchor="middle">logs, qualidade real</text>

  <line x1="625" y1="285" x2="600" y2="285" stroke="#E97451" stroke-width="2" marker-end="url(#cycle-arrow)"/>

  <!-- Phase 6 -->
  <rect x="440" y="250" width="160" height="70" rx="10" fill="#1b263b" stroke="#86efac" stroke-width="2"/>
  <text x="520" y="278" fill="#86efac" font-size="12" font-weight="700" text-anchor="middle">6. MEDIR &amp; AVALIAR</text>
  <text x="520" y="296" fill="#9ca3af" font-size="10" text-anchor="middle">comparar com baseline,</text>
  <text x="520" y="310" fill="#9ca3af" font-size="10" text-anchor="middle">detectar drift</text>

  <line x1="435" y1="285" x2="410" y2="285" stroke="#E97451" stroke-width="2" marker-end="url(#cycle-arrow)"/>

  <!-- Phase 7 -->
  <rect x="250" y="250" width="160" height="70" rx="10" fill="#1b263b" stroke="#fbbf24" stroke-width="2"/>
  <text x="330" y="278" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">7. ITERAR</text>
  <text x="330" y="296" fill="#9ca3af" font-size="10" text-anchor="middle">refinar prompt, ajustar</text>
  <text x="330" y="310" fill="#9ca3af" font-size="10" text-anchor="middle">RAG, trocar modelo</text>

  <line x1="245" y1="285" x2="140" y2="285" stroke="#E97451" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="140" y1="285" x2="140" y2="195" stroke="#E97451" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#cycle-arrow)"/>

  <!-- Center note -->
  <rect x="170" y="370" width="560" height="100" rx="10" fill="#1b263b" stroke="#E97451" stroke-width="2"/>
  <text x="450" y="396" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">A DIFERENÇA QUE PEGA EQUIPES DESPREPARADAS</text>
  <text x="450" y="420" fill="#e5e7eb" font-size="11" text-anchor="middle">Software tradicional: deploy é o fim do ciclo, depois é manutenção.</text>
  <text x="450" y="438" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">Software de IA: deploy é o início do ciclo. Modelo, dados e contexto evoluem constantemente.</text>
  <text x="450" y="458" fill="#9ca3af" font-size="10" text-anchor="middle" font-style="italic">Equipes que tratam IA como software estático sofrem em silêncio até a degradação virar incidente.</text>

  <text x="450" y="510" fill="#9ca3af" font-size="11" text-anchor="middle" font-style="italic">O ciclo nunca para. Quem para de medir, para de melhorar, e provavelmente para de funcionar bem.</text>
</svg>
