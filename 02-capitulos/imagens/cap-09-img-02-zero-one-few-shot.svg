<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="540" fill="#0d1b2a"/>

  <text x="450" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">ZERO-SHOT · ONE-SHOT · FEW-SHOT</text>
  <text x="450" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">A quantidade de exemplos no prompt muda radicalmente a qualidade do resultado</text>

  <!-- Zero-shot -->
  <g>
    <rect x="60" y="100" width="240" height="400" rx="12" fill="#1b263b" stroke="#fbbf24" stroke-width="2"/>
    <text x="180" y="130" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">ZERO-SHOT</text>
    <text x="180" y="148" fill="#9ca3af" font-size="10" text-anchor="middle" font-style="italic">nenhum exemplo</text>

    <rect x="80" y="170" width="200" height="100" rx="6" fill="#374151"/>
    <text x="90" y="188" fill="#fef3c7" font-size="10" font-weight="600">Prompt:</text>
    <text x="90" y="208" fill="#e5e7eb" font-size="10">"Classifique este e-mail como</text>
    <text x="90" y="222" fill="#e5e7eb" font-size="10">urgente, normal ou spam:</text>
    <text x="90" y="240" fill="#e5e7eb" font-size="10" font-style="italic">'Reunião remarcada amanhã'"</text>

    <text x="180" y="296" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">↓</text>

    <rect x="80" y="310" width="200" height="60" rx="6" fill="#fbbf24" opacity="0.3"/>
    <text x="180" y="332" fill="#fef3c7" font-size="11" text-anchor="middle" font-weight="600">Resposta:</text>
    <text x="180" y="352" fill="#fbbf24" font-size="11" text-anchor="middle">normal</text>

    <text x="180" y="402" fill="#fef3c7" font-size="11" font-weight="700" text-anchor="middle">QUANDO USAR:</text>
    <text x="180" y="422" fill="#9ca3af" font-size="10" text-anchor="middle">• Tarefas simples</text>
    <text x="180" y="440" fill="#9ca3af" font-size="10" text-anchor="middle">• Modelos grandes</text>
    <text x="180" y="458" fill="#9ca3af" font-size="10" text-anchor="middle">• Quando não tem</text>
    <text x="180" y="476" fill="#9ca3af" font-size="10" text-anchor="middle">exemplos disponíveis</text>
  </g>

  <!-- One-shot -->
  <g>
    <rect x="320" y="100" width="240" height="400" rx="12" fill="#1b263b" stroke="#fb923c" stroke-width="2"/>
    <text x="440" y="130" fill="#fb923c" font-size="14" font-weight="700" text-anchor="middle">ONE-SHOT</text>
    <text x="440" y="148" fill="#9ca3af" font-size="10" text-anchor="middle" font-style="italic">1 exemplo</text>

    <rect x="340" y="170" width="200" height="100" rx="6" fill="#374151"/>
    <text x="350" y="188" fill="#fef3c7" font-size="10" font-weight="600">Exemplo:</text>
    <text x="350" y="204" fill="#e5e7eb" font-size="9" font-style="italic">'CEO quer call HOJE' → urgente</text>
    <text x="350" y="222" fill="#fef3c7" font-size="10" font-weight="600">Prompt:</text>
    <text x="350" y="238" fill="#e5e7eb" font-size="9">"Classifique:</text>
    <text x="350" y="254" fill="#e5e7eb" font-size="9" font-style="italic">'Reunião remarcada amanhã'"</text>

    <text x="440" y="296" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">↓</text>

    <rect x="340" y="310" width="200" height="60" rx="6" fill="#fb923c" opacity="0.3"/>
    <text x="440" y="332" fill="#fef3c7" font-size="11" text-anchor="middle" font-weight="600">Resposta:</text>
    <text x="440" y="352" fill="#fb923c" font-size="11" text-anchor="middle">normal</text>

    <text x="440" y="402" fill="#fef3c7" font-size="11" font-weight="700" text-anchor="middle">QUANDO USAR:</text>
    <text x="440" y="422" fill="#9ca3af" font-size="10" text-anchor="middle">• Quando formato</text>
    <text x="440" y="440" fill="#9ca3af" font-size="10" text-anchor="middle">específico importa</text>
    <text x="440" y="458" fill="#9ca3af" font-size="10" text-anchor="middle">• Calibrar tom</text>
    <text x="440" y="476" fill="#9ca3af" font-size="10" text-anchor="middle">• Reduzir ambiguidade</text>
  </g>

  <!-- Few-shot -->
  <g>
    <rect x="580" y="100" width="260" height="400" rx="12" fill="#1b263b" stroke="#86efac" stroke-width="2"/>
    <text x="710" y="130" fill="#86efac" font-size="14" font-weight="700" text-anchor="middle">FEW-SHOT</text>
    <text x="710" y="148" fill="#9ca3af" font-size="10" text-anchor="middle" font-style="italic">3 a 10 exemplos</text>

    <rect x="600" y="170" width="220" height="100" rx="6" fill="#374151"/>
    <text x="610" y="188" fill="#fef3c7" font-size="10" font-weight="600">Exemplos:</text>
    <text x="610" y="202" fill="#e5e7eb" font-size="9" font-style="italic">'CEO call HOJE' → urgente</text>
    <text x="610" y="216" fill="#e5e7eb" font-size="9" font-style="italic">'Novidade chegou!' → spam</text>
    <text x="610" y="230" fill="#e5e7eb" font-size="9" font-style="italic">'Status do projeto' → normal</text>
    <text x="610" y="246" fill="#fef3c7" font-size="10" font-weight="600">Prompt:</text>
    <text x="610" y="262" fill="#e5e7eb" font-size="9" font-style="italic">'Reunião remarcada amanhã'</text>

    <text x="710" y="296" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">↓</text>

    <rect x="600" y="310" width="220" height="60" rx="6" fill="#86efac" opacity="0.3"/>
    <text x="710" y="332" fill="#fef3c7" font-size="11" text-anchor="middle" font-weight="600">Resposta:</text>
    <text x="710" y="352" fill="#86efac" font-size="11" text-anchor="middle" font-weight="700">normal · confiança 0.94</text>

    <text x="710" y="402" fill="#fef3c7" font-size="11" font-weight="700" text-anchor="middle">QUANDO USAR:</text>
    <text x="710" y="422" fill="#9ca3af" font-size="10" text-anchor="middle">• Padrão recomendado</text>
    <text x="710" y="440" fill="#9ca3af" font-size="10" text-anchor="middle">para uso profissional</text>
    <text x="710" y="458" fill="#9ca3af" font-size="10" text-anchor="middle">• Maior consistência</text>
    <text x="710" y="476" fill="#9ca3af" font-size="10" text-anchor="middle">• Casos ambíguos</text>
  </g>

  <text x="450" y="525" fill="#fbbf24" font-size="11" text-anchor="middle" font-style="italic">Em geral, 3 a 5 exemplos bem escolhidos batem 20 exemplos genéricos. Curadoria importa mais que volume.</text>
</svg>
