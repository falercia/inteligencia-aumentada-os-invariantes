<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Inter, system-ui, sans-serif">
  <title>RACI canônico de IA corporativa</title>
  <desc>Matriz 8 papéis × 12 decisões críticas. R = Responsible, A = Accountable, C = Consulted, I = Informed. Cada linha tem único A.</desc>

  <rect width="1100" height="720" fill="#fefce8"/>

  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0d1b2a">RACI CANÔNICO DE IA CORPORATIVA</text>
  <text x="550" y="60" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">8 papéis × 12 decisões críticas · cada linha tem único A · sustenta o Invariante 8</text>

  <!-- Cabeçalho de colunas (papéis) - 8 colunas
       Largura total da matriz: 760. Coluna decisão: 240 (x=40 a 280). 8 papéis de 95 cada (x=280 a 1040) -->
  <g>
    <rect x="40" y="90" width="240" height="44" fill="#0d1b2a" stroke="#374151" stroke-width="0.5"/>
    <text x="160" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#fef3c7">DECISÃO ↓ / PAPEL →</text>

    <g font-size="10" font-weight="700" fill="#fef3c7">
