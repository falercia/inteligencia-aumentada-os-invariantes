      <text x="517" y="124" text-anchor="middle">/ Head Dados</text>

      <rect x="565" y="90" width="95" height="44" fill="#1b263b" stroke="#374151" stroke-width="0.5"/>
      <text x="612" y="108" text-anchor="middle">DPO</text>
      <text x="612" y="124" text-anchor="middle">/ Privacidade</text>

      <rect x="660" y="90" width="95" height="44" fill="#1b263b" stroke="#374151" stroke-width="0.5"/>
      <text x="707" y="108" text-anchor="middle">Compliance</text>
      <text x="707" y="124" text-anchor="middle">/ Jurídico</text>

      <rect x="755" y="90" width="95" height="44" fill="#1b263b" stroke="#374151" stroke-width="0.5"/>
      <text x="802" y="108" text-anchor="middle">Head</text>
      <text x="802" y="124" text-anchor="middle">de Produto</text>

