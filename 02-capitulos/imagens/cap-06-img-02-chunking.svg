<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="540" fill="#0d1b2a"/>

  <text x="450" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">ESTRATÉGIAS DE CHUNKING</text>
  <text x="450" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">Como você quebra os documentos determina metade da qualidade do RAG</text>

  <!-- Strategy 1: Fixed size -->
  <g>
    <rect x="60" y="100" width="380" height="195" rx="10" fill="#1b263b" stroke="#fb923c" stroke-width="1.5"/>
    <text x="250" y="128" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">1. TAMANHO FIXO (BASELINE)</text>
    <text x="250" y="146" fill="#9ca3af" font-size="11" text-anchor="middle">corta a cada N tokens, sem se importar com o conteúdo</text>

    <rect x="80" y="170" width="80" height="32" rx="4" fill="#fde68a"/>
    <text x="120" y="190" fill="#0d1b2a" font-size="10" text-anchor="middle">chunk 1</text>
    <rect x="165" y="170" width="80" height="32" rx="4" fill="#fde68a"/>
    <text x="205" y="190" fill="#0d1b2a" font-size="10" text-anchor="middle">chunk 2</text>
    <rect x="250" y="170" width="80" height="32" rx="4" fill="#fde68a"/>
    <text x="290" y="190" fill="#0d1b2a" font-size="10" text-anchor="middle">chunk 3</text>
    <rect x="335" y="170" width="80" height="32" rx="4" fill="#fde68a"/>
    <text x="375" y="190" fill="#0d1b2a" font-size="10" text-anchor="middle">chunk 4</text>

    <text x="80" y="232" fill="#86efac" font-size="11">✓ Simples de implementar</text>
    <text x="80" y="250" fill="#86efac" font-size="11">✓ Funciona para textos uniformes</text>
    <text x="80" y="270" fill="#fca5a5" font-size="11">✗ Quebra frases no meio</text>
    <text x="80" y="288" fill="#fca5a5" font-size="11">✗ Perde estrutura semântica</text>
  </g>

  <!-- Strategy 2: With overlap -->
  <g>
    <rect x="460" y="100" width="380" height="195" rx="10" fill="#1b263b" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="650" y="128" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">2. TAMANHO FIXO + SOBREPOSIÇÃO</text>
    <text x="650" y="146" fill="#9ca3af" font-size="11" text-anchor="middle">chunks se sobrepõem em 10-20% para preservar contexto de fronteira</text>

    <rect x="480" y="170" width="100" height="32" rx="4" fill="#fde68a" opacity="0.8"/>
    <text x="530" y="190" fill="#0d1b2a" font-size="10" text-anchor="middle">chunk 1</text>
    <rect x="560" y="170" width="100" height="32" rx="4" fill="#fdba74" opacity="0.7"/>
    <text x="610" y="190" fill="#0d1b2a" font-size="10" text-anchor="middle">chunk 2</text>
    <rect x="640" y="170" width="100" height="32" rx="4" fill="#fde68a" opacity="0.8"/>
    <text x="690" y="190" fill="#0d1b2a" font-size="10" text-anchor="middle">chunk 3</text>
    <rect x="720" y="170" width="100" height="32" rx="4" fill="#fdba74" opacity="0.7"/>
    <text x="770" y="190" fill="#0d1b2a" font-size="10" text-anchor="middle">chunk 4</text>

    <text x="480" y="232" fill="#86efac" font-size="11">✓ Reduz perda em fronteiras</text>
    <text x="480" y="250" fill="#86efac" font-size="11">✓ Equilíbrio bom para uso geral</text>
    <text x="480" y="270" fill="#fca5a5" font-size="11">✗ Aumenta volume armazenado</text>
    <text x="480" y="288" fill="#fca5a5" font-size="11">✗ Ainda ignora estrutura do doc</text>
  </g>

  <!-- Strategy 3: Semantic chunking -->
  <g>
    <rect x="60" y="315" width="380" height="200" rx="10" fill="#1b263b" stroke="#86efac" stroke-width="1.5"/>
    <text x="250" y="343" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">3. CHUNKING SEMÂNTICO</text>
    <text x="250" y="361" fill="#9ca3af" font-size="11" text-anchor="middle">corta nas mudanças de tópico, respeita seções, parágrafos, frases</text>

    <rect x="80" y="385" width="90" height="32" rx="4" fill="#bbf7d0"/>
    <text x="125" y="405" fill="#0d1b2a" font-size="9" text-anchor="middle">§1 Introdução</text>
    <rect x="175" y="385" width="120" height="32" rx="4" fill="#bbf7d0"/>
    <text x="235" y="405" fill="#0d1b2a" font-size="9" text-anchor="middle">§2 Conceitos</text>
    <rect x="300" y="385" width="100" height="32" rx="4" fill="#bbf7d0"/>
    <text x="350" y="405" fill="#0d1b2a" font-size="9" text-anchor="middle">§3 Exemplos</text>

    <text x="80" y="450" fill="#86efac" font-size="11">✓ Preserva unidades de significado</text>
    <text x="80" y="468" fill="#86efac" font-size="11">✓ Recuperação mais relevante</text>
    <text x="80" y="488" fill="#fca5a5" font-size="11">✗ Mais complexo de implementar</text>
    <text x="80" y="506" fill="#fca5a5" font-size="11">✗ Custa pré-processamento extra</text>
  </g>

  <!-- Strategy 4: Hierarchical -->
  <g>
    <rect x="460" y="315" width="380" height="200" rx="10" fill="#1b263b" stroke="#86efac" stroke-width="1.5"/>
    <text x="650" y="343" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">4. HIERÁRQUICO (ESTADO DA ARTE)</text>
    <text x="650" y="361" fill="#9ca3af" font-size="11" text-anchor="middle">múltiplos níveis: documento → seção → parágrafo, com metadata rica</text>

    <rect x="500" y="380" width="300" height="20" rx="3" fill="#86efac" opacity="0.6"/>
    <text x="650" y="394" fill="#0d1b2a" font-size="10" text-anchor="middle" font-weight="700">documento inteiro (resumo)</text>

    <rect x="500" y="405" width="142" height="18" rx="3" fill="#86efac" opacity="0.5"/>
    <text x="571" y="418" fill="#0d1b2a" font-size="9" text-anchor="middle">seção A</text>
    <rect x="650" y="405" width="150" height="18" rx="3" fill="#86efac" opacity="0.5"/>
    <text x="725" y="418" fill="#0d1b2a" font-size="9" text-anchor="middle">seção B</text>

    <rect x="500" y="428" width="68" height="16" rx="3" fill="#86efac" opacity="0.4"/>
    <rect x="572" y="428" width="68" height="16" rx="3" fill="#86efac" opacity="0.4"/>
    <rect x="650" y="428" width="68" height="16" rx="3" fill="#86efac" opacity="0.4"/>
    <rect x="722" y="428" width="68" height="16" rx="3" fill="#86efac" opacity="0.4"/>
    <text x="650" y="455" fill="#9ca3af" font-size="9" text-anchor="middle">parágrafos individuais</text>

    <text x="480" y="486" fill="#86efac" font-size="11">✓ Recuperação multinível</text>
    <text x="480" y="504" fill="#fca5a5" font-size="11">✗ Exige arquitetura mais sofisticada</text>
  </g>
</svg>
