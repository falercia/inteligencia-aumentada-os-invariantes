<svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="1000" height="540" fill="#0d1b2a"/>
  <text x="500" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">SETE ALAVANCAS DE ECONOMIA DE TOKENS</text>
  <text x="500" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">Em ordem de impacto típico, do mais transformador ao incremental</text>

  <g>
    <rect x="60" y="100" width="940" height="55" rx="6" fill="#dc2626"/>
    <text x="80" y="124" fill="#fef3c7" font-size="13" font-weight="700">1. PROMPT CACHING</text>
    <text x="80" y="142" fill="#fef3c7" font-size="11">Cache de prefixos estáveis cobra 10% do preço · ROI imediato em sistemas com system prompt longo</text>
    <text x="920" y="135" fill="#fef3c7" font-size="11" font-weight="700" text-anchor="end">↓ 40-70%</text>
  </g>

  <g>
    <rect x="60" y="160" width="940" height="55" rx="6" fill="#ea580c"/>
    <text x="80" y="184" fill="#fef3c7" font-size="13" font-weight="700">2. ROTEAMENTO ENTRE MODELOS</text>
    <text x="80" y="202" fill="#fef3c7" font-size="11">Haiku para classificação, Sonnet para grosso, Opus para crítico · classificador inicial barato</text>
    <text x="920" y="195" fill="#fef3c7" font-size="11" font-weight="700" text-anchor="end">↓ 30-60%</text>
  </g>

  <g>
    <rect x="60" y="220" width="940" height="55" rx="6" fill="#fb923c"/>
    <text x="80" y="244" fill="#fef3c7" font-size="13" font-weight="700">3. RAG ENXUTO EM VEZ DE CONTEXTO LONGO</text>
    <text x="80" y="262" fill="#fef3c7" font-size="11">Recupera só os chunks relevantes · top-k apropriado, reranking ativo</text>
    <text x="920" y="255" fill="#fef3c7" font-size="11" font-weight="700" text-anchor="end">↓ 30-50%</text>
  </g>

  <g>
    <rect x="60" y="280" width="940" height="55" rx="6" fill="#fbbf24"/>
    <text x="80" y="304" fill="#0d1b2a" font-size="13" font-weight="700">4. CONTROLE DE VERBOSIDADE DE SAÍDA</text>
    <text x="80" y="322" fill="#0d1b2a" font-size="11">Output custa 3-5x mais que input · instruir resposta concisa quando apropriado</text>
    <text x="920" y="315" fill="#0d1b2a" font-size="11" font-weight="700" text-anchor="end">↓ 25-45%</text>
  </g>

  <g>
    <rect x="60" y="340" width="940" height="55" rx="6" fill="#84cc16"/>
    <text x="80" y="364" fill="#0d1b2a" font-size="13" font-weight="700">5. SUMARIZAÇÃO HIERÁRQUICA DE HISTÓRICO</text>
    <text x="80" y="382" fill="#0d1b2a" font-size="11">Conversa longa? Resuma turnos antigos em sumário compacto · mantém continuidade</text>
    <text x="920" y="375" fill="#0d1b2a" font-size="11" font-weight="700" text-anchor="end">↓ 20-40%</text>
  </g>

  <g>
    <rect x="60" y="400" width="940" height="55" rx="6" fill="#86efac"/>
    <text x="80" y="424" fill="#0d1b2a" font-size="13" font-weight="700">6. COMPRESSÃO DE KNOWLEDGE BASE</text>
    <text x="80" y="442" fill="#0d1b2a" font-size="11">Documentos verbosos viram versões enxutas · reescrita uma vez, economia recorrente</text>
    <text x="920" y="435" fill="#0d1b2a" font-size="11" font-weight="700" text-anchor="end">↓ 15-30%</text>
  </g>

  <g>
    <rect x="60" y="460" width="940" height="55" rx="6" fill="#bfdbfe"/>
    <text x="80" y="484" fill="#0d1b2a" font-size="13" font-weight="700">7. INSTRUMENTAÇÃO E MONITORAMENTO</text>
    <text x="80" y="502" fill="#0d1b2a" font-size="11">O que você não mede, não otimiza · dashboards de tokens por feature</text>
    <text x="920" y="495" fill="#0d1b2a" font-size="11" font-weight="700" text-anchor="end">→ habilita resto</text>
  </g>
</svg>
