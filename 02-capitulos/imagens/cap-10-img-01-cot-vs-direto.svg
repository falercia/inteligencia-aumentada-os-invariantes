<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="540" fill="#fefce8"/>

  <text x="450" y="40" fill="#0d1b2a" font-size="22" font-weight="700" text-anchor="middle">CHAIN OF THOUGHT vs RESPOSTA DIRETA</text>
  <text x="450" y="64" fill="#6b7280" font-size="13" text-anchor="middle">Pedir ao modelo para "pensar passo a passo" muda dramaticamente a qualidade em problemas complexos</text>

  <!-- Problem -->
  <rect x="60" y="100" width="780" height="60" rx="8" fill="#1f2937"/>
  <text x="80" y="124" fill="#9ca3af" font-size="11" font-weight="600">PROBLEMA:</text>
  <text x="80" y="146" fill="#fef3c7" font-size="13" font-style="italic">"Uma loja vendeu 12 camisas a R$ 45, 8 calças a R$ 89, com 15% de imposto e 7% de comissão. Qual o lucro líquido?"</text>

  <!-- Sem CoT -->
  <g>
    <rect x="60" y="190" width="370" height="320" rx="12" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
    <text x="245" y="218" fill="#dc2626" font-size="14" font-weight="700" text-anchor="middle">SEM CHAIN OF THOUGHT</text>
    <text x="245" y="236" fill="#9ca3af" font-size="10" text-anchor="middle" font-style="italic">"Responda diretamente"</text>

    <rect x="80" y="256" width="330" height="60" rx="6" fill="#fff" stroke="#dc2626"/>
    <text x="90" y="278" fill="#0d1b2a" font-size="11" font-weight="600">Resposta do modelo:</text>
    <text x="90" y="300" fill="#dc2626" font-size="14" font-weight="700">"R$ 1.187,50"</text>

    <text x="80" y="346" fill="#0d1b2a" font-size="12" font-weight="600">Problemas:</text>
    <text x="80" y="368" fill="#374151" font-size="11">✗ Resposta confiante mas errada</text>
    <text x="80" y="388" fill="#374151" font-size="11">✗ Impossível auditar o raciocínio</text>
    <text x="80" y="408" fill="#374151" font-size="11">✗ Erros em qualquer passo invisíveis</text>
    <text x="80" y="428" fill="#374151" font-size="11">✗ Modelo "pula" para conclusão</text>

    <text x="245" y="470" fill="#dc2626" font-size="12" font-weight="700" text-anchor="middle">Taxa de acerto: ~45%</text>
    <text x="245" y="488" fill="#9ca3af" font-size="10" text-anchor="middle">em benchmark GSM8K</text>
  </g>

  <!-- Com CoT -->
  <g>
    <rect x="470" y="190" width="370" height="320" rx="12" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
    <text x="655" y="218" fill="#16a34a" font-size="14" font-weight="700" text-anchor="middle">COM CHAIN OF THOUGHT</text>
    <text x="655" y="236" fill="#9ca3af" font-size="10" text-anchor="middle" font-style="italic">"Pense passo a passo antes de responder"</text>

    <rect x="490" y="256" width="330" height="170" rx="6" fill="#fff" stroke="#16a34a"/>
    <text x="500" y="276" fill="#0d1b2a" font-size="10" font-weight="600">Raciocínio:</text>
    <text x="500" y="294" fill="#374151" font-size="10">1. Camisas: 12 × 45 = 540</text>
    <text x="500" y="310" fill="#374151" font-size="10">2. Calças: 8 × 89 = 712</text>
    <text x="500" y="326" fill="#374151" font-size="10">3. Receita: 540 + 712 = 1.252</text>
    <text x="500" y="342" fill="#374151" font-size="10">4. Imposto: 15% × 1.252 = 187,80</text>
    <text x="500" y="358" fill="#374151" font-size="10">5. Comissão: 7% × 1.252 = 87,64</text>
    <text x="500" y="374" fill="#374151" font-size="10">6. Custos: 187,80 + 87,64 = 275,44</text>
    <text x="500" y="392" fill="#374151" font-size="10">7. Líquido: 1.252 - 275,44 = 976,56</text>

    <text x="500" y="415" fill="#16a34a" font-size="11" font-weight="700">Resposta: R$ 976,56</text>

    <text x="655" y="470" fill="#16a34a" font-size="12" font-weight="700" text-anchor="middle">Taxa de acerto: ~80%</text>
    <text x="655" y="488" fill="#9ca3af" font-size="10" text-anchor="middle">em benchmark GSM8K</text>
  </g>

  <text x="450" y="528" fill="#E97451" font-size="12" text-anchor="middle" font-weight="600">CoT custa mais tokens, mas a diferença de qualidade em raciocínio complexo é frequentemente de 30 a 60 pontos percentuais.</text>
</svg>
