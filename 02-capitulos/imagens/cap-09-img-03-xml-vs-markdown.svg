<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="520" fill="#fefce8"/>

  <text x="450" y="40" fill="#0d1b2a" font-size="22" font-weight="700" text-anchor="middle">PROMPT ESTRUTURADO — XML, MARKDOWN, JSON</text>
  <text x="450" y="64" fill="#6b7280" font-size="13" text-anchor="middle">Modelos modernos respondem melhor quando você sinaliza estrutura claramente</text>

  <!-- XML -->
  <g>
    <rect x="40" y="100" width="270" height="380" rx="10" fill="#1f2937"/>
    <text x="175" y="128" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">XML — recomendado pela Anthropic</text>

    <text x="60" y="160" fill="#86efac" font-size="11" font-family="monospace">&lt;role&gt;</text>
    <text x="60" y="178" fill="#fef3c7" font-size="10" font-family="monospace">  analista financeiro sênior</text>
    <text x="60" y="194" fill="#86efac" font-size="11" font-family="monospace">&lt;/role&gt;</text>

    <text x="60" y="220" fill="#86efac" font-size="11" font-family="monospace">&lt;contexto&gt;</text>
    <text x="60" y="238" fill="#fef3c7" font-size="10" font-family="monospace">  Fintech BR analisando</text>
    <text x="60" y="254" fill="#fef3c7" font-size="10" font-family="monospace">  expansão para MX...</text>
    <text x="60" y="270" fill="#86efac" font-size="11" font-family="monospace">&lt;/contexto&gt;</text>

    <text x="60" y="296" fill="#86efac" font-size="11" font-family="monospace">&lt;tarefa&gt;</text>
    <text x="60" y="314" fill="#fef3c7" font-size="10" font-family="monospace">  Recomendar estratégia</text>
    <text x="60" y="330" fill="#86efac" font-size="11" font-family="monospace">&lt;/tarefa&gt;</text>

    <text x="60" y="356" fill="#86efac" font-size="11" font-family="monospace">&lt;formato&gt;</text>
    <text x="60" y="374" fill="#fef3c7" font-size="10" font-family="monospace">  JSON estruturado</text>
    <text x="60" y="390" fill="#86efac" font-size="11" font-family="monospace">&lt;/formato&gt;</text>

    <text x="175" y="430" fill="#86efac" font-size="11" text-anchor="middle" font-weight="700">✓ Claude treinado para XML</text>
    <text x="175" y="450" fill="#9ca3af" font-size="10" text-anchor="middle">Delimitação inequívoca</text>
    <text x="175" y="466" fill="#9ca3af" font-size="10" text-anchor="middle">Reduz ambiguidade</text>
  </g>

  <!-- Markdown -->
  <g>
    <rect x="320" y="100" width="270" height="380" rx="10" fill="#1f2937"/>
    <text x="455" y="128" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">MARKDOWN — mais legível</text>

    <text x="340" y="160" fill="#fb923c" font-size="11" font-family="monospace"># Papel</text>
    <text x="340" y="178" fill="#fef3c7" font-size="10" font-family="monospace">Analista financeiro sênior</text>

    <text x="340" y="208" fill="#fb923c" font-size="11" font-family="monospace">## Contexto</text>
    <text x="340" y="226" fill="#fef3c7" font-size="10" font-family="monospace">Fintech BR analisando</text>
    <text x="340" y="242" fill="#fef3c7" font-size="10" font-family="monospace">expansão para MX...</text>

    <text x="340" y="272" fill="#fb923c" font-size="11" font-family="monospace">## Tarefa</text>
    <text x="340" y="290" fill="#fef3c7" font-size="10" font-family="monospace">Recomendar estratégia</text>

    <text x="340" y="320" fill="#fb923c" font-size="11" font-family="monospace">## Formato</text>
    <text x="340" y="338" fill="#fef3c7" font-size="10" font-family="monospace">- JSON com 4 campos</text>
    <text x="340" y="354" fill="#fef3c7" font-size="10" font-family="monospace">- Sem comentários extras</text>

    <text x="455" y="410" fill="#fb923c" font-size="11" text-anchor="middle" font-weight="700">✓ Legível por humanos</text>
    <text x="455" y="430" fill="#9ca3af" font-size="10" text-anchor="middle">Funciona bem em GPT</text>
    <text x="455" y="446" fill="#9ca3af" font-size="10" text-anchor="middle">Boa para times mistos</text>
    <text x="455" y="466" fill="#fca5a5" font-size="10" text-anchor="middle">Pode confundir conteúdo</text>
  </g>

  <!-- JSON -->
  <g>
    <rect x="600" y="100" width="270" height="380" rx="10" fill="#1f2937"/>
    <text x="735" y="128" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">JSON — para APIs e tools</text>

    <text x="620" y="160" fill="#86efac" font-size="11" font-family="monospace">{</text>
    <text x="620" y="178" fill="#fef3c7" font-size="10" font-family="monospace">  "role": "analista",</text>
    <text x="620" y="196" fill="#fef3c7" font-size="10" font-family="monospace">  "contexto": {...},</text>
    <text x="620" y="214" fill="#fef3c7" font-size="10" font-family="monospace">  "tarefa": "...",</text>
    <text x="620" y="232" fill="#fef3c7" font-size="10" font-family="monospace">  "exemplos": [</text>
    <text x="620" y="250" fill="#fef3c7" font-size="10" font-family="monospace">    {"in":"...", "out":"..."}</text>
    <text x="620" y="268" fill="#fef3c7" font-size="10" font-family="monospace">  ],</text>
    <text x="620" y="286" fill="#fef3c7" font-size="10" font-family="monospace">  "formato_saida": {</text>
    <text x="620" y="304" fill="#fef3c7" font-size="10" font-family="monospace">    "type": "object",</text>
    <text x="620" y="322" fill="#fef3c7" font-size="10" font-family="monospace">    "schema": {...}</text>
    <text x="620" y="340" fill="#fef3c7" font-size="10" font-family="monospace">  }</text>
    <text x="620" y="358" fill="#86efac" font-size="11" font-family="monospace">}</text>

    <text x="735" y="410" fill="#86efac" font-size="11" text-anchor="middle" font-weight="700">✓ Parsing programático</text>
    <text x="735" y="430" fill="#9ca3af" font-size="10" text-anchor="middle">Integra com tools</text>
    <text x="735" y="446" fill="#9ca3af" font-size="10" text-anchor="middle">Function calling</text>
    <text x="735" y="466" fill="#fca5a5" font-size="10" text-anchor="middle">Menos legível humano</text>
  </g>

  <text x="450" y="505" fill="#dc2626" font-size="11" text-anchor="middle" font-weight="600">Para Claude, prefira XML. Para GPT, ambos funcionam. Para integração, JSON com Schema.</text>
</svg>
