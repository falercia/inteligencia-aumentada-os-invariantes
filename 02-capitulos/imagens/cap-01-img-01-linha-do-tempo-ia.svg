<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E97451"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="620" fill="url(#bg1)"/>

  <text x="500" y="50" fill="#fef3c7" font-size="24" font-weight="700" text-anchor="middle">A LINHA DO TEMPO DA INTELIGÊNCIA ARTIFICIAL</text>
  <text x="500" y="78" fill="#9ca3af" font-size="14" text-anchor="middle">1943 — 2026 · Oito décadas de tentativas, invernos e renascimentos</text>

  <!-- Timeline base -->
  <line x1="80" y1="320" x2="920" y2="320" stroke="url(#orangeGrad)" stroke-width="3"/>

  <!-- Decade markers -->
  <g font-size="11" fill="#9ca3af">
    <text x="80" y="345" text-anchor="middle">1940</text>
    <text x="184" y="345" text-anchor="middle">1960</text>
    <text x="288" y="345" text-anchor="middle">1980</text>
    <text x="392" y="345" text-anchor="middle">2000</text>
    <text x="496" y="345" text-anchor="middle">2010</text>
    <text x="600" y="345" text-anchor="middle">2017</text>
    <text x="704" y="345" text-anchor="middle">2020</text>
    <text x="808" y="345" text-anchor="middle">2023</text>
    <text x="912" y="345" text-anchor="middle">2026</text>
  </g>

  <!-- Era backgrounds -->
  <rect x="80" y="298" width="208" height="44" fill="#374151" opacity="0.35" rx="4"/>
  <rect x="288" y="298" width="104" height="44" fill="#7f1d1d" opacity="0.35" rx="4"/>
  <rect x="392" y="298" width="104" height="44" fill="#1e3a8a" opacity="0.35" rx="4"/>
  <rect x="496" y="298" width="104" height="44" fill="#365314" opacity="0.45" rx="4"/>
  <rect x="600" y="298" width="312" height="44" fill="url(#orangeGrad)" opacity="0.65" rx="4"/>

  <text x="184" y="380" fill="#9ca3af" font-size="11" text-anchor="middle" font-style="italic">Fundações</text>
  <text x="340" y="380" fill="#fca5a5" font-size="11" text-anchor="middle" font-style="italic">Invernos</text>
  <text x="444" y="380" fill="#93c5fd" font-size="11" text-anchor="middle" font-style="italic">Renascimento</text>
  <text x="548" y="380" fill="#bef264" font-size="11" text-anchor="middle" font-style="italic">Deep Learning</text>
  <text x="756" y="380" fill="#fef3c7" font-size="11" text-anchor="middle" font-style="italic">Era dos Transformers e Agentes</text>

  <!-- Milestone dots and labels (upper) -->
  <g>
    <circle cx="84" cy="320" r="6" fill="#E97451"/>
    <line x1="84" y1="314" x2="84" y2="200" stroke="#E97451" stroke-width="1.2" opacity="0.6"/>
    <text x="84" y="190" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">1943</text>
    <text x="84" y="174" fill="#e5e7eb" font-size="11" text-anchor="middle">McCulloch &amp; Pitts</text>

    <circle cx="160" cy="320" r="6" fill="#E97451"/>
    <line x1="160" y1="314" x2="160" y2="240" stroke="#E97451" stroke-width="1.2" opacity="0.6"/>
    <text x="160" y="230" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">1950</text>
    <text x="160" y="214" fill="#e5e7eb" font-size="11" text-anchor="middle">Teste de Turing</text>

    <circle cx="184" cy="320" r="6" fill="#E97451"/>
    <line x1="184" y1="314" x2="184" y2="155" stroke="#E97451" stroke-width="1.2" opacity="0.6"/>
    <text x="184" y="145" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">1956</text>
    <text x="184" y="129" fill="#e5e7eb" font-size="11" text-anchor="middle">Dartmouth Workshop</text>
    <text x="184" y="113" fill="#9ca3af" font-size="10" text-anchor="middle">nasce o termo "AI"</text>

    <circle cx="288" cy="320" r="6" fill="#fca5a5"/>
    <line x1="288" y1="314" x2="288" y2="200" stroke="#fca5a5" stroke-width="1.2" opacity="0.6"/>
    <text x="288" y="190" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">1974</text>
    <text x="288" y="174" fill="#fca5a5" font-size="11" text-anchor="middle">1º Inverno</text>

    <circle cx="340" cy="320" r="6" fill="#fca5a5"/>
    <line x1="340" y1="314" x2="340" y2="240" stroke="#fca5a5" stroke-width="1.2" opacity="0.6"/>
    <text x="340" y="230" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">1987</text>
    <text x="340" y="214" fill="#fca5a5" font-size="11" text-anchor="middle">2º Inverno</text>

    <circle cx="392" cy="320" r="6" fill="#93c5fd"/>
    <line x1="392" y1="314" x2="392" y2="200" stroke="#93c5fd" stroke-width="1.2" opacity="0.6"/>
    <text x="392" y="190" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">1997</text>
    <text x="392" y="174" fill="#e5e7eb" font-size="11" text-anchor="middle">Deep Blue × Kasparov</text>

    <circle cx="444" cy="320" r="6" fill="#93c5fd"/>
    <line x1="444" y1="314" x2="444" y2="240" stroke="#93c5fd" stroke-width="1.2" opacity="0.6"/>
    <text x="444" y="230" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">2006</text>
    <text x="444" y="214" fill="#e5e7eb" font-size="11" text-anchor="middle">Hinton popular. Deep Learning</text>

    <circle cx="496" cy="320" r="8" fill="#bef264"/>
    <line x1="496" y1="312" x2="496" y2="155" stroke="#bef264" stroke-width="1.5" opacity="0.7"/>
    <text x="496" y="145" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">2012</text>
    <text x="496" y="129" fill="#bef264" font-size="11" text-anchor="middle">AlexNet vence ImageNet</text>
    <text x="496" y="113" fill="#9ca3af" font-size="10" text-anchor="middle">o terremoto silencioso</text>
  </g>

  <!-- Milestone dots (lower) -->
  <g>
    <circle cx="600" cy="320" r="9" fill="#fef3c7" stroke="#E97451" stroke-width="2"/>
    <line x1="600" y1="328" x2="600" y2="445" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>
    <text x="600" y="460" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">2017</text>
    <text x="600" y="476" fill="#fef3c7" font-size="11" text-anchor="middle">"Attention Is All You Need"</text>
    <text x="600" y="492" fill="#9ca3af" font-size="10" text-anchor="middle">nasce o Transformer</text>

    <circle cx="680" cy="320" r="6" fill="#E97451"/>
    <line x1="680" y1="326" x2="680" y2="405" stroke="#E97451" stroke-width="1.2" opacity="0.6"/>
    <text x="680" y="420" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">2020</text>
    <text x="680" y="436" fill="#e5e7eb" font-size="11" text-anchor="middle">GPT-3 (175B)</text>

    <circle cx="760" cy="320" r="8" fill="#fef3c7" stroke="#E97451" stroke-width="2"/>
    <line x1="760" y1="328" x2="760" y2="510" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>
    <text x="760" y="525" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">2022</text>
    <text x="760" y="541" fill="#fef3c7" font-size="11" text-anchor="middle">ChatGPT</text>
    <text x="760" y="557" fill="#9ca3af" font-size="10" text-anchor="middle">IA chega ao mainstream</text>

    <circle cx="820" cy="320" r="6" fill="#E97451"/>
    <line x1="820" y1="326" x2="820" y2="405" stroke="#E97451" stroke-width="1.2" opacity="0.6"/>
    <text x="820" y="420" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">2023</text>
    <text x="820" y="436" fill="#e5e7eb" font-size="11" text-anchor="middle">Claude · GPT-4 · Gemini</text>

    <circle cx="876" cy="320" r="6" fill="#E97451"/>
    <line x1="876" y1="326" x2="876" y2="445" stroke="#E97451" stroke-width="1.2" opacity="0.6"/>
    <text x="876" y="460" fill="#fef3c7" font-size="12" font-weight="600" text-anchor="middle">2025</text>
    <text x="876" y="476" fill="#e5e7eb" font-size="11" text-anchor="middle">Claude Code · MCP</text>
    <text x="876" y="492" fill="#9ca3af" font-size="10" text-anchor="middle">era dos agentes começa</text>

    <circle cx="912" cy="320" r="8" fill="#fef3c7" stroke="#E97451" stroke-width="2"/>
    <line x1="912" y1="328" x2="912" y2="510" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>
    <text x="912" y="525" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">2026</text>
    <text x="912" y="541" fill="#fef3c7" font-size="11" text-anchor="middle">Platô da Fronteira</text>
    <text x="912" y="557" fill="#9ca3af" font-size="10" text-anchor="middle">agentes em produção</text>
  </g>

  <!-- Bottom note -->
  <text x="500" y="600" fill="#6b7280" font-size="11" text-anchor="middle" font-style="italic">"Quem entende a história de uma tecnologia entende o que vem depois."</text>
</svg>
