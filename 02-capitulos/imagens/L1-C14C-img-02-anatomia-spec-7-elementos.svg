<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Inter, system-ui, sans-serif">
  <title>C14C — Anatomia da Spec Executável em Sete Elementos</title>
  <desc>Os sete elementos obrigatórios de uma especificação digna de servir como fonte de verdade para agente de codificação.</desc>

  <defs>
    <linearGradient id="centroGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="petalaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="620" fill="#0d1b2a"/>

  <text x="500" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#fef3c7">ANATOMIA DA SPEC EXECUTÁVEL — SETE ELEMENTOS OBRIGATÓRIOS</text>
  <text x="500" y="64" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">A ausência de qualquer elemento converte revisão de código em adivinhação retroativa</text>

  <!-- Centro -->
  <circle cx="500" cy="340" r="78" fill="url(#centroGrad)" stroke="#fbbf24" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#fef3c7">SPEC</text>
  <text x="500" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#fef3c7">EXECUTÁVEL</text>
  <text x="500" y="365" text-anchor="middle" font-size="10" fill="#fbbf24" font-style="italic">Fonte de verdade</text>

  <!-- 7 elementos ao redor -->
  <!-- 1 - Escopo positivo e negativo (topo) -->
  <g>
    <rect x="395" y="100" width="210" height="80" rx="8" fill="url(#petalaGrad)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="500" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">1 · ESCOPO ± </text>
    <text x="500" y="145" text-anchor="middle" font-size="10" fill="#fef3c7">Positivo e negativo</text>
    <text x="500" y="160" text-anchor="middle" font-size="9" fill="#e5e7eb">O que está dentro e o que está</text>
    <text x="500" y="172" text-anchor="middle" font-size="9" fill="#e5e7eb">explicitamente fora do escopo</text>
  </g>

  <!-- 2 - Invariantes do domínio (topo direita) -->
  <g>
    <rect x="700" y="160" width="210" height="80" rx="8" fill="url(#petalaGrad)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="805" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">2 · INVARIANTES</text>
    <text x="805" y="205" text-anchor="middle" font-size="10" fill="#fef3c7">Do domínio</text>
    <text x="805" y="220" text-anchor="middle" font-size="9" fill="#e5e7eb">Regras verdadeiras antes,</text>
    <text x="805" y="232" text-anchor="middle" font-size="9" fill="#e5e7eb">durante e depois da execução</text>
  </g>

  <!-- 3 - Critérios de aceitação (direita) -->
  <g>
    <rect x="760" y="300" width="220" height="80" rx="8" fill="url(#petalaGrad)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="870" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">3 · ACEITAÇÃO</text>
    <text x="870" y="345" text-anchor="middle" font-size="10" fill="#fef3c7">Critérios de pronto</text>
    <text x="870" y="360" text-anchor="middle" font-size="9" fill="#e5e7eb">Testes, métricas e condições</text>
    <text x="870" y="372" text-anchor="middle" font-size="9" fill="#e5e7eb">observáveis verificáveis</text>
  </g>

  <!-- 4 - Interfaces e contratos (baixo direita) -->
  <g>
    <rect x="700" y="440" width="210" height="80" rx="8" fill="url(#petalaGrad)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="805" y="465" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">4 · CONTRATOS</text>
    <text x="805" y="485" text-anchor="middle" font-size="10" fill="#fef3c7">Interfaces e tipos</text>
    <text x="805" y="500" text-anchor="middle" font-size="9" fill="#e5e7eb">Entrada, saída, comportamento</text>
    <text x="805" y="512" text-anchor="middle" font-size="9" fill="#e5e7eb">em erro, limites de recursos</text>
  </g>

  <!-- 5 - Restrições não funcionais (baixo) -->
  <g>
    <rect x="395" y="500" width="210" height="80" rx="8" fill="url(#petalaGrad)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="500" y="525" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">5 · RESTRIÇÕES</text>
    <text x="500" y="545" text-anchor="middle" font-size="10" fill="#fef3c7">Não funcionais</text>
    <text x="500" y="560" text-anchor="middle" font-size="9" fill="#e5e7eb">Latência, custo, observabilidade,</text>
    <text x="500" y="572" text-anchor="middle" font-size="9" fill="#e5e7eb">compliance, política de dados</text>
  </g>

  <!-- 6 - Pontos de validação humana (baixo esquerda) -->
  <g>
    <rect x="90" y="440" width="210" height="80" rx="8" fill="url(#petalaGrad)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="195" y="465" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">6 · GATES</text>
    <text x="195" y="485" text-anchor="middle" font-size="10" fill="#fef3c7">Validação humana</text>
    <text x="195" y="500" text-anchor="middle" font-size="9" fill="#e5e7eb">Onde o agente para e espera</text>
    <text x="195" y="512" text-anchor="middle" font-size="9" fill="#e5e7eb">confirmação antes de prosseguir</text>
  </g>

  <!-- 7 - Exemplos canônicos (esquerda) -->
  <g>
    <rect x="20" y="300" width="220" height="80" rx="8" fill="url(#petalaGrad)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="130" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">7 · EXEMPLOS</text>
    <text x="130" y="345" text-anchor="middle" font-size="10" fill="#fef3c7">Casos canônicos</text>
    <text x="130" y="360" text-anchor="middle" font-size="9" fill="#e5e7eb">Entrada e saída esperadas,</text>
    <text x="130" y="372" text-anchor="middle" font-size="9" fill="#e5e7eb">suficientes para fixar interpretação</text>
  </g>

  <!-- Elemento adicional topo esquerda -->
  <g>
    <rect x="90" y="160" width="210" height="80" rx="8" fill="url(#petalaGrad)" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="0"/>
    <text x="195" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">Versionamento semântico</text>
    <text x="195" y="218" text-anchor="middle" font-size="9" fill="#9ca3af" font-style="italic">A spec tem ciclo de vida</text>
    <text x="195" y="230" text-anchor="middle" font-size="9" fill="#9ca3af" font-style="italic">próprio, com changelog público</text>
  </g>

  <!-- Linhas conectando ao centro -->
  <line x1="500" y1="180" x2="500" y2="262" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="700" y1="200" x2="568" y2="285" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="760" y1="340" x2="578" y2="340" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="700" y1="480" x2="568" y2="395" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="500" y1="500" x2="500" y2="418" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="300" y1="480" x2="432" y2="395" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="240" y1="340" x2="422" y2="340" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>

  <text x="500" y="600" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">Spec sem qualquer destes elementos é prompt prolixo, não engenharia. O agente preenche silêncio com plausibilidade local.</text>
</svg>
