<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="620" fill="#0d1b2a"/>

  <text x="400" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">A ANATOMIA DE UM TRANSFORMER</text>
  <text x="400" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">A arquitetura que mudou a IA em 2017 — simplificada</text>

  <!-- Input -->
  <rect x="280" y="100" width="240" height="50" rx="8" fill="#374151"/>
  <text x="400" y="125" fill="#fef3c7" font-size="13" font-weight="700" text-anchor="middle">TEXTO DE ENTRADA</text>
  <text x="400" y="142" fill="#9ca3af" font-size="11" text-anchor="middle">"A capital do Brasil é"</text>

  <!-- Arrow down -->
  <line x1="400" y1="150" x2="400" y2="170" stroke="#E97451" stroke-width="2"/>
  <polygon points="395,165 400,178 405,165" fill="#E97451"/>

  <!-- Tokenization -->
  <rect x="280" y="180" width="240" height="40" rx="6" fill="#1f2937" stroke="#6b7280"/>
  <text x="400" y="205" fill="#e5e7eb" font-size="12" text-anchor="middle">Tokenização</text>

  <line x1="400" y1="220" x2="400" y2="238" stroke="#E97451" stroke-width="2"/>
  <polygon points="395,233 400,246 405,233" fill="#E97451"/>

  <!-- Embedding -->
  <rect x="280" y="248" width="240" height="40" rx="6" fill="#1f2937" stroke="#6b7280"/>
  <text x="400" y="273" fill="#e5e7eb" font-size="12" text-anchor="middle">Embeddings + Posição</text>

  <line x1="400" y1="288" x2="400" y2="306" stroke="#E97451" stroke-width="2"/>
  <polygon points="395,301 400,314 405,301" fill="#E97451"/>

  <!-- Transformer block (the core) -->
  <rect x="180" y="316" width="440" height="180" rx="12" fill="#1b263b" stroke="#E97451" stroke-width="2"/>
  <text x="400" y="340" fill="#E97451" font-size="13" font-weight="700" text-anchor="middle">BLOCO TRANSFORMER (repetido N vezes)</text>

  <!-- Self-attention -->
  <rect x="210" y="360" width="170" height="50" rx="6" fill="#E97451"/>
  <text x="295" y="382" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">Self-Attention</text>
  <text x="295" y="398" fill="#fef3c7" font-size="10" text-anchor="middle">"em que tokens olhar?"</text>

  <!-- Feed forward -->
  <rect x="420" y="360" width="170" height="50" rx="6" fill="#fb923c"/>
  <text x="505" y="382" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">Feed-Forward</text>
  <text x="505" y="398" fill="#fef3c7" font-size="10" text-anchor="middle">"processa o que olhou"</text>

  <!-- Residual + norm -->
  <text x="400" y="436" fill="#9ca3af" font-size="11" text-anchor="middle">+ Residual Connections + Layer Norm</text>

  <text x="400" y="468" fill="#9ca3af" font-size="11" text-anchor="middle">em modelos frontier: 80–120 blocos empilhados</text>
  <text x="400" y="485" fill="#fbbf24" font-size="10" text-anchor="middle" font-style="italic">é aqui que mora a "inteligência"</text>

  <line x1="400" y1="496" x2="400" y2="514" stroke="#E97451" stroke-width="2"/>
  <polygon points="395,509 400,522 405,509" fill="#E97451"/>

  <!-- Output projection -->
  <rect x="280" y="524" width="240" height="40" rx="6" fill="#1f2937" stroke="#6b7280"/>
  <text x="400" y="549" fill="#e5e7eb" font-size="12" text-anchor="middle">Projeção sobre vocabulário</text>

  <line x1="400" y1="564" x2="400" y2="580" stroke="#E97451" stroke-width="2"/>
  <polygon points="395,575 400,588 405,575" fill="#E97451"/>

  <!-- Final -->
  <text x="400" y="608" fill="#E97451" font-size="14" font-weight="700" text-anchor="middle">→ probabilidades para cada token possível</text>
</svg>
