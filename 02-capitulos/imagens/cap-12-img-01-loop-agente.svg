<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="loop-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E97451"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#0d1b2a"/>

  <text x="450" y="40" fill="#fef3c7" font-size="22" font-weight="700" text-anchor="middle">O LOOP DO AGENTE</text>
  <text x="450" y="64" fill="#9ca3af" font-size="13" text-anchor="middle">A unidade fundamental de operação de um agente é o ciclo Perceber → Planejar → Agir → Observar → Refletir</text>

  <!-- Center: Goal -->
  <circle cx="450" cy="310" r="65" fill="#E97451" stroke="#fef3c7" stroke-width="2"/>
  <text x="450" y="305" fill="#fef3c7" font-size="14" font-weight="700" text-anchor="middle">OBJETIVO</text>
  <text x="450" y="324" fill="#fef3c7" font-size="11" text-anchor="middle">dado pelo</text>
  <text x="450" y="338" fill="#fef3c7" font-size="11" text-anchor="middle">usuário</text>

  <!-- 5 nodes around -->
  <!-- 1. Perceive (top) -->
  <g>
    <rect x="370" y="120" width="160" height="60" rx="10" fill="#1b263b" stroke="#fbbf24" stroke-width="2"/>
    <text x="450" y="146" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">1. PERCEBER</text>
    <text x="450" y="165" fill="#9ca3af" font-size="10" text-anchor="middle">lê o contexto, captura estado</text>
  </g>
  <line x1="450" y1="180" x2="450" y2="245" stroke="#E97451" stroke-width="2" marker-end="url(#loop-arrow)"/>

  <!-- 2. Plan (top-right) -->
  <g>
    <rect x="640" y="200" width="160" height="60" rx="10" fill="#1b263b" stroke="#86efac" stroke-width="2"/>
    <text x="720" y="226" fill="#86efac" font-size="13" font-weight="700" text-anchor="middle">2. PLANEJAR</text>
    <text x="720" y="245" fill="#9ca3af" font-size="10" text-anchor="middle">decide próxima ação</text>
  </g>
  <path d="M 514 296 Q 600 280 644 250" stroke="#E97451" stroke-width="2" fill="none" marker-end="url(#loop-arrow)"/>

  <!-- 3. Act (bottom-right) -->
  <g>
    <rect x="640" y="380" width="160" height="60" rx="10" fill="#1b263b" stroke="#fb923c" stroke-width="2"/>
    <text x="720" y="406" fill="#fb923c" font-size="13" font-weight="700" text-anchor="middle">3. AGIR</text>
    <text x="720" y="425" fill="#9ca3af" font-size="10" text-anchor="middle">chama tool, executa código</text>
  </g>
  <line x1="720" y1="260" x2="720" y2="375" stroke="#E97451" stroke-width="2" marker-end="url(#loop-arrow)"/>

  <!-- 4. Observe (bottom) -->
  <g>
    <rect x="370" y="440" width="160" height="60" rx="10" fill="#1b263b" stroke="#bfdbfe" stroke-width="2"/>
    <text x="450" y="466" fill="#bfdbfe" font-size="13" font-weight="700" text-anchor="middle">4. OBSERVAR</text>
    <text x="450" y="485" fill="#9ca3af" font-size="10" text-anchor="middle">recebe resultado da ação</text>
  </g>
  <line x1="640" y1="410" x2="535" y2="465" stroke="#E97451" stroke-width="2" marker-end="url(#loop-arrow)"/>

  <!-- 5. Reflect (bottom-left) -->
  <g>
    <rect x="100" y="380" width="160" height="60" rx="10" fill="#1b263b" stroke="#fca5a5" stroke-width="2"/>
    <text x="180" y="406" fill="#fca5a5" font-size="13" font-weight="700" text-anchor="middle">5. REFLETIR</text>
    <text x="180" y="425" fill="#9ca3af" font-size="10" text-anchor="middle">avalia: objetivo cumprido?</text>
  </g>
  <line x1="365" y1="470" x2="265" y2="440" stroke="#E97451" stroke-width="2" marker-end="url(#loop-arrow)"/>

  <!-- Loop back to perceive -->
  <path d="M 180 380 Q 100 250 370 160" stroke="#E97451" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#loop-arrow)"/>
  <text x="130" y="240" fill="#fbbf24" font-size="11" font-weight="600">repete até cumprir</text>

  <!-- Exit -->
  <text x="80" y="400" fill="#86efac" font-size="11" font-weight="600">se cumprido →</text>
  <text x="80" y="416" fill="#86efac" font-size="11" font-weight="600">entrega resposta</text>

  <text x="450" y="540" fill="#9ca3af" font-size="11" text-anchor="middle" font-style="italic">A diferença entre chatbot e agente está aqui. O chatbot completa um turno. O agente completa um objetivo.</text>
</svg>
