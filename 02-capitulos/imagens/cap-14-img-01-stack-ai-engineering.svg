<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="580" fill="#fefce8"/>

  <text x="450" y="40" fill="#0d1b2a" font-size="22" font-weight="700" text-anchor="middle">A STACK MODERNA DE AI ENGINEERING</text>
  <text x="450" y="64" fill="#6b7280" font-size="13" text-anchor="middle">Sete camadas que compõem uma operação madura de IA em produção</text>

  <!-- Layer 7: Governance -->
  <rect x="60" y="100" width="780" height="55" rx="8" fill="#dc2626"/>
  <text x="80" y="125" fill="#fef3c7" font-size="13" font-weight="700">7. GOVERNANÇA &amp; COMPLIANCE</text>
  <text x="80" y="143" fill="#fef3c7" font-size="11">políticas, auditoria, LGPD/GDPR, controle de acesso, revisão ética</text>

  <!-- Layer 6: Observability -->
  <rect x="60" y="160" width="780" height="55" rx="8" fill="#E97451"/>
  <text x="80" y="185" fill="#fef3c7" font-size="13" font-weight="700">6. OBSERVABILIDADE &amp; AVALIAÇÃO</text>
  <text x="80" y="203" fill="#fef3c7" font-size="11">tracing, logs, métricas, evals automatizados, A/B testing, alertas</text>

  <!-- Layer 5: Orchestration -->
  <rect x="60" y="220" width="780" height="55" rx="8" fill="#fb923c"/>
  <text x="80" y="245" fill="#fef3c7" font-size="13" font-weight="700">5. ORQUESTRAÇÃO DE AGENTES</text>
  <text x="80" y="263" fill="#fef3c7" font-size="11">LangGraph, CrewAI, agentes especializados, workflows, function calling</text>

  <!-- Layer 4: Context -->
  <rect x="60" y="280" width="780" height="55" rx="8" fill="#fbbf24"/>
  <text x="80" y="305" fill="#0d1b2a" font-size="13" font-weight="700">4. CONTEXT ENGINEERING</text>
  <text x="80" y="323" fill="#0d1b2a" font-size="11">prompts versionados, RAG, memória, caching, hierarquização de contexto</text>

  <!-- Layer 3: Integration -->
  <rect x="60" y="340" width="780" height="55" rx="8" fill="#fde68a"/>
  <text x="80" y="365" fill="#0d1b2a" font-size="13" font-weight="700">3. INTEGRAÇÃO &amp; TOOLS</text>
  <text x="80" y="383" fill="#0d1b2a" font-size="11">MCP, function calling, conectores corporativos, APIs externas</text>

  <!-- Layer 2: Data -->
  <rect x="60" y="400" width="780" height="55" rx="8" fill="#bbf7d0"/>
  <text x="80" y="425" fill="#0d1b2a" font-size="13" font-weight="700">2. CAMADA DE DADOS</text>
  <text x="80" y="443" fill="#0d1b2a" font-size="11">bancos vetoriais (Pinecone, Qdrant), embeddings, chunking, ingestão</text>

  <!-- Layer 1: Models -->
  <rect x="60" y="460" width="780" height="55" rx="8" fill="#bfdbfe"/>
  <text x="80" y="485" fill="#0d1b2a" font-size="13" font-weight="700">1. MODELOS &amp; INFRAESTRUTURA</text>
  <text x="80" y="503" fill="#0d1b2a" font-size="11">Claude, GPT, Gemini, open source · AWS/GCP/Azure · roteamento entre modelos</text>

  <text x="450" y="555" fill="#E97451" font-size="12" text-anchor="middle" font-weight="600">AI Engineer é quem opera todas essas camadas com fluência. Não é prompt engineer, não é cientista de dados.</text>
</svg>
