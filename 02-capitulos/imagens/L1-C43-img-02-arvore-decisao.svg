<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 820" font-family="Inter, system-ui, sans-serif">
  <title>Árvore de Decisão Integrada dos Seis Trade-offs Canônicos</title>
  <desc>Fluxograma vertical percorrendo os 6 trade-offs canônicos na sequência sugerida: T4 Latência×Qualidade×Custo → T1 RAG×Fine-tuning×Prompt → T5 Automação×Human-in-the-loop → T2 Agente×Workflow → T6 Generalismo×Especialização → T3 Fechado×Open source. Cada nó tem a pergunta executiva.</desc>

  <rect width="700" height="820" fill="#fefce8"/>

  <!-- Título -->
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0d1b2a">ÁRVORE DE DECISÃO DOS TRADE-OFFS</text>
  <text x="350" y="56" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">Seis trade-offs canônicos, uma sequência — cada um é triângulo, não dicotomia</text>

  <!-- ====================================================
       6 NODOS VERTICAIS
       Largura caixa: 540, centrada em x=350 → x=80..620
       Altura caixa: 90px
       Gap entre caixas: 25px
       Setas de conexão: centro x=350

       y-positions (topo de cada caixa):
       T4: y=80
       T1: y=205
       T5: y=330
       T2: y=455
       T6: y=580
       T3: y=705
  ==================================================== -->

  <!-- ==== T4 ==== -->
  <rect x="80" y="80" width="540" height="100" fill="#0d1b2a" rx="6"/>
  <!-- Badge -->
  <rect x="80" y="80" width="60" height="100" fill="#E97451" rx="6"/>
  <rect x="116" y="80" width="8" height="100" fill="#0d1b2a"/>
  <text x="110" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#fef3c7">T4</text>
  <text x="110" y="148" text-anchor="middle" font-size="9" fill="#fef3c7">1º passo</text>
  <!-- Conteúdo -->
  <text x="370" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#E97451">Latência × Qualidade × Custo</text>
  <text x="370" y="127" text-anchor="middle" font-size="11" fill="#fef3c7" font-style="italic">"Qual é minha restrição dominante?"</text>
  <line x1="155" y1="138" x2="615" y2="138" stroke="#374151" stroke-width="0.8"/>
  <text x="370" y="155" text-anchor="middle" font-size="10" fill="#cbd5e1">Identifique o vértice que você NÃO pode sacrificar: latência (tempo real), qualidade (regulado) ou custo (volume).</text>
  <text x="370" y="170" text-anchor="middle" font-size="10" fill="#cbd5e1">Esse vértice define os dois restantes.</text>

  <!-- Seta T4→T1 -->
  <line x1="350" y1="180" x2="350" y2="205" stroke="#E97451" stroke-width="2"/>
  <polygon points="344,201 350,211 356,201" fill="#E97451"/>
  <text x="380" y="196" font-size="9" fill="#6b7280" font-style="italic">restrição definida →</text>

  <!-- ==== T1 ==== -->
  <rect x="80" y="205" width="540" height="100" fill="#1b263b" rx="6"/>
  <rect x="80" y="205" width="60" height="100" fill="#E97451" rx="6"/>
  <rect x="116" y="205" width="8" height="100" fill="#1b263b"/>
  <text x="110" y="253" text-anchor="middle" font-size="16" font-weight="700" fill="#fef3c7">T1</text>
  <text x="110" y="273" text-anchor="middle" font-size="9" fill="#fef3c7">2º passo</text>
  <text x="370" y="233" text-anchor="middle" font-size="13" font-weight="700" fill="#E97451">RAG × Fine-tuning × Prompt</text>
  <text x="370" y="252" text-anchor="middle" font-size="11" fill="#fef3c7" font-style="italic">"Conhecimento atualizado ou comportamento personalizado?"</text>
  <line x1="155" y1="263" x2="615" y2="263" stroke="#374151" stroke-width="0.8"/>
  <text x="370" y="280" text-anchor="middle" font-size="10" fill="#cbd5e1">RAG → corpus muda. Fine-tuning → comportamento estável. Prompt → rápido, simples.</text>
  <text x="370" y="295" text-anchor="middle" font-size="10" fill="#cbd5e1">Eixo: frequência de mudança × tamanho do corpus × custo de atualização.</text>

  <!-- Seta T1→T5 -->
  <line x1="350" y1="305" x2="350" y2="330" stroke="#E97451" stroke-width="2"/>
  <polygon points="344,326 350,336 356,326" fill="#E97451"/>
  <text x="380" y="321" font-size="9" fill="#6b7280" font-style="italic">entrega definida →</text>

  <!-- ==== T5 ==== -->
  <rect x="80" y="330" width="540" height="100" fill="#1b263b" rx="6"/>
  <rect x="80" y="330" width="60" height="100" fill="#E97451" rx="6"/>
  <rect x="116" y="330" width="8" height="100" fill="#1b263b"/>
  <text x="110" y="378" text-anchor="middle" font-size="16" font-weight="700" fill="#fef3c7">T5</text>
  <text x="110" y="398" text-anchor="middle" font-size="9" fill="#fef3c7">3º passo</text>
  <text x="370" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#E97451">Automação × Human-in-the-loop</text>
  <text x="370" y="377" text-anchor="middle" font-size="11" fill="#fef3c7" font-style="italic">"Qual o custo de um erro silencioso?"</text>
  <line x1="155" y1="388" x2="615" y2="388" stroke="#374151" stroke-width="0.8"/>
  <text x="370" y="405" text-anchor="middle" font-size="10" fill="#cbd5e1">Erro irreversível ou caro → HITL. Erro reversível + volume alto → automação.</text>
  <text x="370" y="420" text-anchor="middle" font-size="10" fill="#cbd5e1">Eixo: reversibilidade × frequência × consequência. Comece com HITL, migre para automação.</text>

  <!-- Seta T5→T2 -->
  <line x1="350" y1="430" x2="350" y2="455" stroke="#E97451" stroke-width="2"/>
  <polygon points="344,451 350,461 356,451" fill="#E97451"/>
  <text x="380" y="446" font-size="9" fill="#6b7280" font-style="italic">controle definido →</text>

  <!-- ==== T2 ==== -->
  <rect x="80" y="455" width="540" height="100" fill="#374151" rx="6"/>
  <rect x="80" y="455" width="60" height="100" fill="#E97451" rx="6"/>
  <rect x="116" y="455" width="8" height="100" fill="#374151"/>
  <text x="110" y="503" text-anchor="middle" font-size="16" font-weight="700" fill="#fef3c7">T2</text>
  <text x="110" y="523" text-anchor="middle" font-size="9" fill="#fef3c7">4º passo</text>
  <text x="370" y="483" text-anchor="middle" font-size="13" font-weight="700" fill="#E97451">Agente autônomo × Workflow</text>
  <text x="370" y="502" text-anchor="middle" font-size="11" fill="#fef3c7" font-style="italic">"O caminho até a resposta é conhecido ou descoberto?"</text>
  <line x1="155" y1="513" x2="615" y2="513" stroke="#6b7280" stroke-width="0.8"/>
  <text x="370" y="530" text-anchor="middle" font-size="10" fill="#cbd5e1">Caminho conhecido + auditabilidade → workflow. Variabilidade alta → agente supervisionado.</text>
  <text x="370" y="545" text-anchor="middle" font-size="10" fill="#cbd5e1">Eixo: variabilidade × auditabilidade × custo composto. 80%+ conhecidos = workflow.</text>

  <!-- Seta T2→T6 -->
  <line x1="350" y1="555" x2="350" y2="580" stroke="#E97451" stroke-width="2"/>
  <polygon points="344,576 350,586 356,576" fill="#E97451"/>
  <text x="380" y="571" font-size="9" fill="#6b7280" font-style="italic">arquitetura definida →</text>

  <!-- ==== T6 ==== -->
  <rect x="80" y="580" width="540" height="100" fill="#1b263b" rx="6"/>
  <rect x="80" y="580" width="60" height="100" fill="#E97451" rx="6"/>
  <rect x="116" y="580" width="8" height="100" fill="#1b263b"/>
  <text x="110" y="628" text-anchor="middle" font-size="16" font-weight="700" fill="#fef3c7">T6</text>
  <text x="110" y="648" text-anchor="middle" font-size="9" fill="#fef3c7">5º passo</text>
  <text x="370" y="608" text-anchor="middle" font-size="13" font-weight="700" fill="#E97451">Generalismo × Especialização</text>
  <text x="370" y="627" text-anchor="middle" font-size="11" fill="#fef3c7" font-style="italic">"Modelo geral com prompt forte, ou especializado?"</text>
  <line x1="155" y1="638" x2="615" y2="638" stroke="#374151" stroke-width="0.8"/>
  <text x="370" y="655" text-anchor="middle" font-size="10" fill="#cbd5e1">Domínio nicho + volume alto + golden set → especializado. Velocidade + flexibilidade → geral.</text>
  <text x="370" y="670" text-anchor="middle" font-size="10" fill="#cbd5e1">Eixo: volume × estabilidade do domínio × disponibilidade de golden set × custo de treino.</text>

  <!-- Seta T6→T3 -->
  <line x1="350" y1="680" x2="350" y2="705" stroke="#E97451" stroke-width="2"/>
  <polygon points="344,701 350,711 356,701" fill="#E97451"/>
  <text x="380" y="696" font-size="9" fill="#6b7280" font-style="italic">modelo definido →</text>

  <!-- ==== T3 ==== -->
  <rect x="80" y="705" width="540" height="100" fill="#0d1b2a" rx="6"/>
  <rect x="80" y="705" width="60" height="100" fill="#E97451" rx="6"/>
  <rect x="116" y="705" width="8" height="100" fill="#0d1b2a"/>
  <text x="110" y="753" text-anchor="middle" font-size="16" font-weight="700" fill="#fef3c7">T3</text>
  <text x="110" y="773" text-anchor="middle" font-size="9" fill="#fef3c7">6º passo</text>
  <text x="370" y="733" text-anchor="middle" font-size="13" font-weight="700" fill="#E97451">Fechado × Open source self-hosted</text>
  <text x="370" y="752" text-anchor="middle" font-size="11" fill="#fef3c7" font-style="italic">"Preciso de soberania, custo, qualidade ou independência de vendor?"</text>
  <line x1="155" y1="763" x2="615" y2="763" stroke="#374151" stroke-width="0.8"/>
  <text x="370" y="780" text-anchor="middle" font-size="10" fill="#cbd5e1">Ponta de qualidade + sem ops → fechado. Soberania de dado + TCO + lock-in → open source.</text>
  <text x="370" y="795" text-anchor="middle" font-size="10" fill="#cbd5e1">Eixo: soberania × TCO real × qualidade × maturidade de ops × risco de lock-in.</text>

  <!-- Checkmark final -->
  <text x="350" y="815" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">Percorra os 6 nós antes de qualquer aprovação de iniciativa ou decisão de arquitetura.</text>

</svg>
