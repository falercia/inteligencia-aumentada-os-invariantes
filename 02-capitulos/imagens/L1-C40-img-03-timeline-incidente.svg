<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" font-family="Inter, system-ui, sans-serif">
  <title>Linha do tempo de incidente SEV-1</title>
  <desc>Do T0 (detecção) ao D+5 (postmortem publicado). Cada nó com pré-requisito explícito do pilar de LLMOps que o sustenta.</desc>

  <defs>
    <marker id="setaTime" markerWidth="12" markerHeight="12" refX="11" refY="3.5" orient="auto">
      <polygon points="0 0, 11 3.5, 0 7" fill="#E97451"/>
    </marker>
  </defs>

  <rect width="1080" height="500" fill="#0d1b2a"/>

  <text x="540" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#fef3c7">LINHA DO TEMPO DE INCIDENTE SEV-1</text>
  <text x="540" y="64" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">Cada nó depende de um pilar de LLMOps. Sem o pilar, o nó atrasa ou falha.</text>

  <!-- Linha principal: 5 nós equidistantes em x=120,330,540,750,960 -->
  <line x1="100" y1="250" x2="980" y2="250" stroke="#E97451" stroke-width="3" marker-end="url(#setaTime)"/>

  <!-- Nó 1: T0 - Detecção (x=120) -->
  <g>
    <text x="120" y="208" text-anchor="middle" font-size="11" font-style="italic" fill="#9ca3af">10:00:00</text>
    <circle cx="120" cy="250" r="26" fill="#fca5a5" stroke="#fef3c7" stroke-width="2.5"/>
    <text x="120" y="256" text-anchor="middle" font-size="14" font-weight="800" fill="#0d1b2a">T0</text>
    <rect x="55" y="296" width="130" height="120" rx="8" fill="#1b263b" stroke="#fca5a5" stroke-width="1"/>
    <text x="120" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#fca5a5">DETECÇÃO</text>
    <line x1="65" y1="328" x2="175" y2="328" stroke="#fca5a5" stroke-width="0.5"/>
    <text x="120" y="346" text-anchor="middle" font-size="9" fill="#fef3c7">Alerta automático</text>
    <text x="120" y="360" text-anchor="middle" font-size="9" fill="#fef3c7">ou reclamação</text>
    <text x="120" y="374" text-anchor="middle" font-size="9" fill="#fef3c7">de cliente</text>
    <text x="120" y="400" text-anchor="middle" font-size="9" font-weight="700" fill="#86efac">Pilares 1 + 5</text>
  </g>

  <!-- Nó 2: T+5 - Contenção (x=330) -->
  <g>
    <text x="330" y="208" text-anchor="middle" font-size="11" font-style="italic" fill="#9ca3af">10:05:00</text>
    <circle cx="330" cy="250" r="26" fill="#E97451" stroke="#fef3c7" stroke-width="2.5"/>
    <text x="330" y="256" text-anchor="middle" font-size="12" font-weight="800" fill="#fef3c7">T+5</text>
    <rect x="265" y="296" width="130" height="120" rx="8" fill="#1b263b" stroke="#E97451" stroke-width="1"/>
    <text x="330" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#E97451">CONTENÇÃO</text>
    <line x1="275" y1="328" x2="385" y2="328" stroke="#E97451" stroke-width="0.5"/>
    <text x="330" y="346" text-anchor="middle" font-size="9" fill="#fef3c7">Kill switch ou</text>
    <text x="330" y="360" text-anchor="middle" font-size="9" fill="#fef3c7">rollback acionado</text>
    <text x="330" y="374" text-anchor="middle" font-size="9" fill="#fef3c7">feature isolada</text>
    <text x="330" y="400" text-anchor="middle" font-size="9" font-weight="700" fill="#86efac">Pilares 4 + 6</text>
  </g>

  <!-- Nó 3: T+30 - Diagnóstico (x=540) -->
  <g>
    <text x="540" y="208" text-anchor="middle" font-size="11" font-style="italic" fill="#9ca3af">10:30:00</text>
    <circle cx="540" cy="250" r="26" fill="#fbbf24" stroke="#fef3c7" stroke-width="2.5"/>
    <text x="540" y="256" text-anchor="middle" font-size="12" font-weight="800" fill="#0d1b2a">T+30</text>
    <rect x="475" y="296" width="130" height="120" rx="8" fill="#1b263b" stroke="#fbbf24" stroke-width="1"/>
    <text x="540" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">DIAGNÓSTICO</text>
    <line x1="485" y1="328" x2="595" y2="328" stroke="#fbbf24" stroke-width="0.5"/>
    <text x="540" y="346" text-anchor="middle" font-size="9" fill="#fef3c7">Tracing revela</text>
    <text x="540" y="360" text-anchor="middle" font-size="9" fill="#fef3c7">o que mudou</text>
    <text x="540" y="374" text-anchor="middle" font-size="9" fill="#fef3c7">e onde</text>
    <text x="540" y="400" text-anchor="middle" font-size="9" font-weight="700" fill="#86efac">Pilares 1 + 2</text>
  </g>

  <!-- Nó 4: T+1h - Comunicação (x=750) -->
  <g>
    <text x="750" y="208" text-anchor="middle" font-size="11" font-style="italic" fill="#9ca3af">11:00:00</text>
    <circle cx="750" cy="250" r="26" fill="#86efac" stroke="#fef3c7" stroke-width="2.5"/>
    <text x="750" y="256" text-anchor="middle" font-size="12" font-weight="800" fill="#0d1b2a">T+1h</text>
    <rect x="685" y="296" width="130" height="120" rx="8" fill="#1b263b" stroke="#86efac" stroke-width="1"/>
    <text x="750" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#86efac">COMUNICAÇÃO</text>
    <line x1="695" y1="328" x2="805" y2="328" stroke="#86efac" stroke-width="0.5"/>
    <text x="750" y="346" text-anchor="middle" font-size="9" fill="#fef3c7">Interna estruturada</text>
    <text x="750" y="360" text-anchor="middle" font-size="9" fill="#fef3c7">Externa pré-escrita</text>
    <text x="750" y="374" text-anchor="middle" font-size="9" fill="#fef3c7">por classe</text>
    <text x="750" y="400" text-anchor="middle" font-size="9" font-weight="700" fill="#86efac">Pilar 7</text>
  </g>

  <!-- Nó 5: D+5 - Postmortem (x=960) -->
  <g>
    <text x="960" y="208" text-anchor="middle" font-size="11" font-style="italic" fill="#9ca3af">+5 dias</text>
    <circle cx="960" cy="250" r="26" fill="#fef3c7" stroke="#fef3c7" stroke-width="2.5"/>
    <text x="960" y="256" text-anchor="middle" font-size="12" font-weight="800" fill="#0d1b2a">D+5</text>
    <rect x="895" y="296" width="130" height="120" rx="8" fill="#1b263b" stroke="#fef3c7" stroke-width="1"/>
    <text x="960" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#fef3c7">POSTMORTEM</text>
    <line x1="905" y1="328" x2="1015" y2="328" stroke="#fef3c7" stroke-width="0.5"/>
    <text x="960" y="346" text-anchor="middle" font-size="9" fill="#fef3c7">Sem culpa</text>
    <text x="960" y="360" text-anchor="middle" font-size="9" fill="#fef3c7">Ações corretivas</text>
    <text x="960" y="374" text-anchor="middle" font-size="9" fill="#fef3c7">com dono e prazo</text>
    <text x="960" y="400" text-anchor="middle" font-size="9" font-weight="700" fill="#86efac">Pilar 7</text>
  </g>

  <text x="120" y="446" text-anchor="middle" font-size="10" fill="#9ca3af">MTTR alvo: ≤ 15min</text>
  <text x="960" y="446" text-anchor="middle" font-size="10" fill="#9ca3af">Retenção: 90d / 5 anos</text>

  <text x="540" y="478" text-anchor="middle" font-size="11" fill="#fef3c7" font-style="italic">★ Sem os 7 pilares, este timeline vira semanas. Com eles, vira horas. — Invariante 6</text>
</svg>
