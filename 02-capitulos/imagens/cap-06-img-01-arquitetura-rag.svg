<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="rag-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E97451"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="#fefce8"/>

  <text x="500" y="40" fill="#0d1b2a" font-size="22" font-weight="700" text-anchor="middle">ARQUITETURA RAG COMPLETA</text>
  <text x="500" y="64" fill="#6b7280" font-size="13" text-anchor="middle">Retrieval-Augmented Generation: o LLM responde com base em conhecimento recuperado, não inventado</text>

  <!-- INDEXING (top half) -->
  <text x="60" y="105" fill="#0d1b2a" font-size="13" font-weight="700">FASE 1 · INDEXAÇÃO (feita uma vez, atualizada periodicamente)</text>

  <rect x="60" y="120" width="160" height="70" rx="8" fill="#1f2937"/>
  <text x="140" y="148" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">Documentos</text>
  <text x="140" y="166" fill="#9ca3af" font-size="10" text-anchor="middle">PDFs, wikis, base</text>
  <text x="140" y="180" fill="#9ca3af" font-size="10" text-anchor="middle">de conhecimento</text>

  <path d="M 220 155 L 254 155" stroke="#E97451" stroke-width="2" marker-end="url(#rag-arrow)"/>

  <rect x="260" y="120" width="160" height="70" rx="8" fill="#fde68a" stroke="#fb923c"/>
  <text x="340" y="148" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Chunking</text>
  <text x="340" y="166" fill="#374151" font-size="10" text-anchor="middle">divide em pedaços</text>
  <text x="340" y="180" fill="#374151" font-size="10" text-anchor="middle">de ~500-1000 tokens</text>

  <path d="M 420 155 L 454 155" stroke="#E97451" stroke-width="2" marker-end="url(#rag-arrow)"/>

  <rect x="460" y="120" width="160" height="70" rx="8" fill="#fde68a" stroke="#fb923c"/>
  <text x="540" y="148" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Embeddings</text>
  <text x="540" y="166" fill="#374151" font-size="10" text-anchor="middle">cada chunk vira</text>
  <text x="540" y="180" fill="#374151" font-size="10" text-anchor="middle">um vetor numérico</text>

  <path d="M 620 155 L 654 155" stroke="#E97451" stroke-width="2" marker-end="url(#rag-arrow)"/>

  <rect x="660" y="120" width="280" height="70" rx="8" fill="#E97451"/>
  <text x="800" y="148" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">Banco Vetorial</text>
  <text x="800" y="166" fill="#fef3c7" font-size="10" text-anchor="middle">armazena os vetores + metadados</text>
  <text x="800" y="180" fill="#fef3c7" font-size="10" text-anchor="middle">Pinecone, Qdrant, ChromaDB, Weaviate...</text>

  <!-- Divisor -->
  <line x1="60" y1="230" x2="940" y2="230" stroke="#9ca3af" stroke-dasharray="6 4"/>

  <!-- QUERY (bottom half) -->
  <text x="60" y="260" fill="#0d1b2a" font-size="13" font-weight="700">FASE 2 · CONSULTA EM TEMPO REAL (cada pergunta do usuário)</text>

  <rect x="60" y="280" width="160" height="60" rx="8" fill="#1f2937"/>
  <text x="140" y="305" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">Pergunta do</text>
  <text x="140" y="322" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">usuário</text>

  <path d="M 220 310 L 254 310" stroke="#E97451" stroke-width="2" marker-end="url(#rag-arrow)"/>

  <rect x="260" y="280" width="160" height="60" rx="8" fill="#fde68a" stroke="#fb923c"/>
  <text x="340" y="305" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Embedding</text>
  <text x="340" y="322" fill="#0d1b2a" font-size="11" text-anchor="middle">da pergunta</text>

  <path d="M 420 310 L 454 310" stroke="#E97451" stroke-width="2" marker-end="url(#rag-arrow)"/>

  <rect x="460" y="280" width="160" height="60" rx="8" fill="#fde68a" stroke="#fb923c"/>
  <text x="540" y="305" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Busca por</text>
  <text x="540" y="322" fill="#0d1b2a" font-size="11" text-anchor="middle">similaridade</text>

  <path d="M 540 340 L 540 372" stroke="#E97451" stroke-width="2" marker-end="url(#rag-arrow)"/>

  <rect x="380" y="380" width="320" height="60" rx="8" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="540" y="405" fill="#0d1b2a" font-size="12" font-weight="700" text-anchor="middle">Top-K chunks relevantes recuperados</text>
  <text x="540" y="422" fill="#374151" font-size="10" text-anchor="middle">(tipicamente os 3 a 10 mais próximos)</text>

  <path d="M 700 410 L 734 410" stroke="#E97451" stroke-width="2" marker-end="url(#rag-arrow)"/>

  <rect x="740" y="380" width="200" height="60" rx="8" fill="#E97451"/>
  <text x="840" y="405" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">LLM (Claude, GPT...)</text>
  <text x="840" y="422" fill="#fef3c7" font-size="10" text-anchor="middle">recebe pergunta + chunks</text>

  <path d="M 840 440 L 840 472" stroke="#E97451" stroke-width="2" marker-end="url(#rag-arrow)"/>

  <rect x="700" y="480" width="280" height="60" rx="8" fill="#1f2937"/>
  <text x="840" y="505" fill="#fef3c7" font-size="12" font-weight="700" text-anchor="middle">Resposta com base nas fontes</text>
  <text x="840" y="522" fill="#9ca3af" font-size="10" text-anchor="middle">grounded, auditável, com citações</text>

  <text x="200" y="510" fill="#6b7280" font-size="11" text-anchor="start" font-style="italic">→ alucinação cai drasticamente</text>
  <text x="200" y="528" fill="#6b7280" font-size="11" text-anchor="start" font-style="italic">→ conhecimento atualiza sem retreinar</text>
</svg>
